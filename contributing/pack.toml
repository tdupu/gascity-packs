# Contributing — the external-contributor lifecycle for gastownhall/gascity,
# distributed as a Gas City pack.
#
# Gives an outside contributor the full journey of landing work in
# https://github.com/gastownhall/gascity:
#
#   0. start here — route on entry  (start-contribution skill; GATE 0)
#   1. find priority work, OR        (find-work skill)
#      write a best-practice issue   (write-issue skill)
#   2. plan the implementation       (plan-implementation skill)
#   3. fine-tune the diff            (fine-tune skill)
#
# Two sub-skills are a phase of a parent AND a standalone utility (not steps):
#   - map-blast-radius  Phase 2 of plan-implementation; standalone impact map
#   - review            final gate of fine-tune; standalone diff/branch review
#
# SELF-CONTAINED by design. Every step carries Gas City's ACTUAL standards
# baked into the skill text — the full adoption-review audit (B1-B36), the
# blast-radius dimensions, the design-capture discipline, the five test
# tiers, the code conventions — so a contributor's own coding agent applies
# them by READING the skill. There is NO [imports.*]: the pack stands alone
# and depends on nothing a contributor lacks (no internal agents, no sibling
# pack, no maintainer infrastructure).
#
# This is the gas-city-specific instantiation of the contributor lifecycle.
# The generic pr-pipeline pack remains the right choice for cities that want
# discipline without gas-city's particular standards; this pack bakes those
# standards in.
#
# THREE MODES, ONE SET OF STANDARDS:
#   - skills/   — agent-read: your coding agent applies the standards by
#                 READING the skill text. The default for a contributor with a
#                 coding agent. Enter at start-contribution (the GATE 0 router).
#                 (start-contribution, write-issue, find-work,
#                 plan-implementation, fine-tune, map-blast-radius, review)
#   - formulas/ — gc-orchestrated: thin `mol-contributing-*` wrappers that drive
#                 a SINGLE step as a gc formula, for a city that wants to
#                 dispatch it to a transient worker session. Each wrapper DELEGATES
#                 all standards to its sibling skill — the skill stays the single
#                 source of truth; the formula adds only the gc orchestration
#                 (root-bead run state, output paths, blocking early-exit).
#       mol-contributing-find-work            -> find-work skill
#       mol-contributing-plan-implementation  -> plan-implementation skill
#       mol-contributing-map-blast-radius     -> map-blast-radius skill
#       mol-contributing-review               -> review skill
#       mol-contributing-fine-tune            -> fine-tune skill
#     (write-issue has no formula peer — issue authoring sits upstream of the
#     PR flow; use the skill directly.)
#   - mayor mode — orchestrate-contribution: a mayor loop that drives the WHOLE
#                 lifecycle, dispatching the per-step formulas in order and
#                 PAUSING at each of the four human gates. It owns only
#                 dispatch + gate; no formula is modified.
#
# WHY TWO MAP SKILLS. start-contribution and orchestrate-contribution describe
# the same lifecycle for two audiences — a contributor applying steps BY HAND
# vs. a mayor DISPATCHING them to transient workers and gating each. Splitting
# them keeps each skill's `description` precise for its trigger context;
# orchestrate-contribution reuses start-contribution's GATE 0 branch rather
# than restating it, so the entry skill stays the single source of truth.
#
# Usage in your city's pack.toml:
#   [imports.contributing]
#   source = "../packs/contributing"   # path; or git URL when published
#
# The skills then load for your coding agent; the formulas register as gc
# methods. Nothing here pushes a branch or opens a PR — each step produces an
# artifact (an issue, a plan, a report) you act on. Pushing is always your call.

[pack]
name = "contributing"
version = "0.4.0"
schema = 2
