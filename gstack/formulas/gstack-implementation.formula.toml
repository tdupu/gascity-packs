description = """
gstack implementation of the public implement methodology contract.
"""
formula = "gstack-implementation"
version = 1
extends = ["implement"]
target_required = true
internal = true

[requires]
formula_compiler = ">=2.0.0"

[vars]
[vars.implementation_target]
description = "gstack task implementation role."
default = "gstack.implementer"

[[steps]]
id = "drain-separate"
title = "Drain gstack work in separate sessions"
needs = ["prepare"]
condition = "{{drain_policy}} == separate"
metadata = { "gc.run_target" = "{{implementation_target}}" }
description_file = "../assets/workflows/gstack-implementation/drain-separate.md"

[steps.drain]
context = "separate"
formula = "gstack-work"
member_access = "exclusive"

[[steps]]
id = "drain-same-session"
title = "Drain gstack work in one shared session"
needs = ["prepare"]
condition = "{{drain_policy}} == same-session"
metadata = { "gc.run_target" = "{{implementation_target}}" }
description_file = "../assets/workflows/gstack-implementation/drain-same-session.md"

[steps.drain]
context = "shared"
formula = "gstack-work-item"
on_item_failure = "skip_remaining"
member_access = "exclusive"

[steps.drain.item]
single_lane = true
