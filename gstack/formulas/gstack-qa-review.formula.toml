description = """
gstack QA expansion.

This converts gstack /qa into explicit browser QA, regression evidence, fix,
and synthesis lanes.
"""
formula = "gstack-qa-review"
type = "expansion"
version = 1

[requires]
formula_compiler = ">=2.0.0"

[vars]
[vars.implementation_target]
description = "gstack task implementation role used for QA fixes."
default = "gstack.implementer"

[vars.interaction_mode]
description = "Workflow interaction posture: interactive, autonomous, or headless."
default = "interactive"

[[template]]
id = "{target}.setup-gstack-qa"
title = "Prepare gstack QA"
metadata = { "gc.run_target" = "gc.run-operator" }
description_file = "../assets/workflows/gstack-qa-review/{target}.setup-gstack-qa.md"

[[template]]
id = "{target}.gstack-qa-loop"
title = "Run gstack QA until approved"
needs = ["{target}.setup-gstack-qa"]
metadata = { "gc.run_target" = "gc.run-operator" }
description_file = "../assets/workflows/gstack-qa-review/{target}.gstack-qa-loop.md"

[template.check]
max_attempts = 6

[template.check.check]
mode = "exec"
path = ".gc/scripts/checks/implementation-review-approved.sh"
timeout = "10m"

[[template.children]]
id = "{target}.browser-qa"
title = "gstack QA: browser flow"
metadata = { "gc.run_target" = "gstack.qa-lead" }
description_file = "../assets/workflows/gstack-qa-review/{target}.browser-qa.md"

[[template.children]]
id = "{target}.regression-test-review"
title = "gstack QA: regression test evidence"
metadata = { "gc.run_target" = "gstack.staff-reviewer" }
description_file = "../assets/workflows/gstack-qa-review/{target}.regression-test-review.md"

[[template.children]]
id = "{target}.qa-fix-findings"
title = "Apply gstack QA findings"
needs = ["{target}.browser-qa", "{target}.regression-test-review"]
metadata = { "gc.run_target" = "{implementation_target}", "gc.continuation_group" = "gstack-qa-fixes" }
description_file = "../assets/workflows/gstack-qa-review/{target}.qa-fix-findings.md"

[[template.children]]
id = "{target}.synthesize-qa"
title = "Synthesize gstack QA"
needs = ["{target}.qa-fix-findings"]
metadata = { "gc.run_target" = "gstack.review-synthesizer" }
description_file = "../assets/workflows/gstack-qa-review/{target}.synthesize-qa.md"

[[template]]
id = "{target}"
title = "Finalize gstack QA"
needs = ["{target}.gstack-qa-loop"]
metadata = { "gc.run_target" = "gc.run-operator" }
description_file = "../assets/workflows/gstack-qa-review/{target}.md"
