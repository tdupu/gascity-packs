description = """
gstack release-readiness expansion.

This converts gstack /document-release, /ship, and /land-and-deploy checks into
explicit Gas City readiness lanes before the build finalize and publish stages.
"""
formula = "gstack-release-readiness"
type = "expansion"
version = 1

[requires]
formula_compiler = ">=2.0.0"

[vars]
[vars.review_mode]
description = "Review authority: report, agent, or interactive."
default = "interactive"

[[template]]
id = "{target}.setup-gstack-release"
title = "Prepare gstack release readiness"
metadata = { "gc.run_target" = "gc.run-operator" }
description_file = "../assets/workflows/gstack-release-readiness/{target}.setup-gstack-release.md"

[[template]]
id = "{target}.gstack-release-readiness-loop"
title = "Run gstack release readiness"
needs = ["{target}.setup-gstack-release"]
metadata = { "gc.run_target" = "gc.run-operator" }
description_file = "../assets/workflows/gstack-release-readiness/{target}.gstack-release-readiness-loop.md"

[template.check]
max_attempts = 4

[template.check.check]
mode = "exec"
path = ".gc/scripts/checks/implementation-review-approved.sh"
timeout = "10m"

[[template.children]]
id = "{target}.document-release"
title = "gstack release: documentation"
metadata = { "gc.run_target" = "gstack.docs-engineer" }
description_file = "../assets/workflows/gstack-release-readiness/{target}.document-release.md"

[[template.children]]
id = "{target}.ship-readiness"
title = "gstack release: ship readiness"
metadata = { "gc.run_target" = "gstack.release-engineer" }
description_file = "../assets/workflows/gstack-release-readiness/{target}.ship-readiness.md"

[[template.children]]
id = "{target}.deployment-readiness"
title = "gstack release: deployment readiness"
metadata = { "gc.run_target" = "gstack.release-engineer" }
description_file = "../assets/workflows/gstack-release-readiness/{target}.deployment-readiness.md"

[[template.children]]
id = "{target}.synthesize-release-readiness"
title = "Synthesize gstack release readiness"
needs = [
  "{target}.document-release",
  "{target}.ship-readiness",
  "{target}.deployment-readiness",
]
metadata = { "gc.run_target" = "gstack.review-synthesizer" }
description_file = "../assets/workflows/gstack-release-readiness/{target}.synthesize-release-readiness.md"

[[template]]
id = "{target}"
title = "Finalize gstack release readiness"
needs = ["{target}.gstack-release-readiness-loop"]
metadata = { "gc.run_target" = "gc.run-operator" }
description_file = "../assets/workflows/gstack-release-readiness/{target}.md"
