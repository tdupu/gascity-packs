description = """
gstack plan-review expansion.

This converts gstack autoplan and plan-* review skills into explicit Gas City
founder, design, engineering, and developer-experience lanes.
"""
formula = "gstack-plan-review"
type = "expansion"
version = 1

[requires]
formula_compiler = ">=2.0.0"

[vars]
[vars.implementation_target]
description = "gstack task implementation role used if plan fixes need implementation context."
default = "gstack.implementer"

[vars.interaction_mode]
description = "Workflow interaction posture: interactive, autonomous, or headless."
default = "interactive"

[[template]]
id = "{target}.setup-gstack-plan-review"
title = "Prepare gstack plan review"
metadata = { "gc.run_target" = "gc.run-operator" }
description_file = "../assets/workflows/gstack-plan-review/{target}.setup-gstack-plan-review.md"

[[template]]
id = "{target}.gstack-plan-review-loop"
title = "Run gstack plan review until approved"
needs = ["{target}.setup-gstack-plan-review"]
metadata = { "gc.run_target" = "gc.run-operator" }
description_file = "../assets/workflows/gstack-plan-review/{target}.gstack-plan-review-loop.md"

[template.check]
max_attempts = 6

[template.check.check]
mode = "exec"
path = ".gc/scripts/checks/design-review-approved.sh"
timeout = "10m"

[[template.children]]
id = "{target}.founder-scope-review"
title = "gstack plan review: founder scope"
metadata = { "gc.run_target" = "gstack.founder-reviewer" }
description_file = "../assets/workflows/gstack-plan-review/{target}.founder-scope-review.md"

[[template.children]]
id = "{target}.design-plan-review"
title = "gstack plan review: design"
metadata = { "gc.run_target" = "gstack.design-reviewer" }
description_file = "../assets/workflows/gstack-plan-review/{target}.design-plan-review.md"

[[template.children]]
id = "{target}.engineering-plan-review"
title = "gstack plan review: engineering"
metadata = { "gc.run_target" = "gstack.eng-reviewer" }
description_file = "../assets/workflows/gstack-plan-review/{target}.engineering-plan-review.md"

[[template.children]]
id = "{target}.devex-plan-review"
title = "gstack plan review: developer experience"
metadata = { "gc.run_target" = "gstack.devex-reviewer" }
description_file = "../assets/workflows/gstack-plan-review/{target}.devex-plan-review.md"

[[template.children]]
id = "{target}.synthesize-plan-review"
title = "Synthesize gstack plan review"
needs = [
  "{target}.founder-scope-review",
  "{target}.design-plan-review",
  "{target}.engineering-plan-review",
  "{target}.devex-plan-review",
]
metadata = { "gc.run_target" = "gstack.review-synthesizer" }
description_file = "../assets/workflows/gstack-plan-review/{target}.synthesize-plan-review.md"

[[template.children]]
id = "{target}.apply-plan-review-findings"
title = "Apply gstack plan review findings"
needs = ["{target}.synthesize-plan-review"]
metadata = { "gc.run_target" = "gstack.founder-reviewer", "gc.continuation_group" = "gstack-plan-review-fixes" }
description_file = "../assets/workflows/gstack-plan-review/{target}.apply-plan-review-findings.md"

[[template]]
id = "{target}"
title = "Finalize gstack plan review"
needs = ["{target}.gstack-plan-review-loop"]
metadata = { "gc.run_target" = "gc.run-operator" }
description_file = "../assets/workflows/gstack-plan-review/{target}.md"
