description = """
gstack implementation item formula.
"""
formula = "gstack-work"
version = 1
contract = "graph.v2"
extends = ["do-work"]
target_required = true

[vars]
[vars.implementation_target]
description = "gstack task implementation role."
default = "gstack.implementer"

[[steps]]
id = "implement"
title = "Implement gstack work"
needs = ["prepare-worktree"]
metadata = { "gc.run_target" = "{{implementation_target}}", "gc.build.artifact_schema" = "gc.build.implementation-summary.v1", "gc.build.artifact_path_keys" = "gc.implementation.summary_path,gc.build.implementation_summary_path,gc.var.summary_path" }
description_file = "../assets/workflows/gstack-work/implement.md"

[steps.check]
max_attempts = 3

[steps.check.check]
mode = "exec"
path = ".gc/scripts/checks/build-artifact-valid.sh"
timeout = "5m"

