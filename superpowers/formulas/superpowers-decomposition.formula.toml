description = """
Superpowers implementation of the decomposition-base methodology contract.
"""
formula = "superpowers-decomposition"
version = 1
contract = "graph.v2"
extends = ["decomposition-base"]
target_required = false
internal = true

[[steps]]
id = "decompose"
title = "Create Superpowers implementation convoy"
metadata = { "gc.run_target" = "gc.task-decomposer", "gc.build.artifact_schema" = "gc.build.decomposition.v1", "gc.build.artifact_path_keys" = "gc.build.decomposition_path,gc.var.decomposition_path" }
description_file = "../assets/workflows/superpowers-decomposition/decompose.md"

[steps.check]
max_attempts = 3

[steps.check.check]
mode = "exec"
path = ".gc/scripts/checks/build-artifact-valid.sh"
timeout = "5m"

