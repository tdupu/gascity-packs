description = """
Virtual full-lifecycle build contract.

This formula defines the stage names and artifact expectations that concrete
build methodology packs override. Importers should run a concrete child such as
build-basic, compound-build, superpowers-build, or bmad-build.

Launch inputs:
- artifact_root: {{artifact_root}}
- context_path: {{context_path}}
- requirements_path: {{requirements_path}}
- plan_path: {{plan_path}}
- decomposition_path: {{decomposition_path}}
- drain_policy: {{drain_policy}}
- interaction_mode: {{interaction_mode}}
- review_mode: {{review_mode}}
- implementation_target: {{implementation_target}}
- planning_formula: {{planning_formula}}
- decomposition_formula: {{decomposition_formula}}
- implementation_formula: {{implementation_formula}}
- implementation_item_formula: {{implementation_item_formula}}
- code_review_formula: {{code_review_formula}}
- review_fix_formula: {{review_fix_formula}}
- max_iterations: {{max_iterations}}
- push: {{push}}
- open_pr: {{open_pr}}
"""
formula = "build-base"
version = 1
target_required = true
internal = true

[metadata.gc.methodology]
allowed_drain_policies = ["separate", "same-session"]
implementation_strategy = "drain"
interaction_modes = ["interactive", "autonomous", "headless"]
review_modes = ["report", "agent", "interactive"]

[vars]
[vars.artifact_root]
description = "Build artifact root."
required = true

[vars.context_path]
description = "Optional source context bundle path."
default = ""

[vars.requirements_path]
description = "Requirements artifact path to create or reuse."
default = ""

[vars.plan_path]
description = "Plan or design artifact path to create or reuse."
default = ""

[vars.decomposition_path]
description = "Task decomposition artifact path to create or reuse."
default = ""

[vars.drain_policy]
description = "Implementation drain policy."
default = "separate"

[vars.interaction_mode]
description = "Workflow interaction posture: interactive, autonomous, or headless."
default = "interactive"

[vars.review_mode]
description = "Review authority: report, agent, or interactive."
default = "agent"

[vars.implementation_target]
description = "Role target for implementation work."
default = "gc.implementation-worker"

[vars.planning_formula]
description = "Planning methodology formula used by adapters that delegate planning."
default = "planning-base"

[vars.decomposition_formula]
description = "Decomposition methodology formula used by adapters that delegate task creation."
default = "decomposition-base"

[vars.implementation_formula]
description = "Implementation methodology formula used by adapters that delegate implementation."
default = "implement"

[vars.implementation_item_formula]
description = "Single-item implementation formula used by shared-drain adapters."
default = "do-work-item"

[vars.code_review_formula]
description = "Code-review methodology formula used by adapters that delegate review."
default = "review"

[vars.review_fix_formula]
description = "Review-fix methodology formula used after failed code-review findings."
default = "fix-loop-base"

[vars.max_iterations]
description = "Maximum implementation/review fix attempts."
default = "10"

[vars.push]
description = "Set true to allow final publish push after all checks pass."
default = "false"

[vars.open_pr]
description = "Set true to allow final PR creation after all checks pass."
default = "false"

[[steps]]
id = "prepare"
title = "Prepare build context"
metadata = { "gc.run_target" = "gc.run-operator" }
description_file = "../assets/workflows/build-base/prepare.md"

[[steps]]
id = "requirements"
title = "Produce requirements"
needs = ["prepare"]
metadata = { "gc.run_target" = "gc.requirements-planner", "gc.build.artifact_schema" = "gc.build.requirements.v1", "gc.build.artifact_path_keys" = "gc.build.requirements_path,gc.var.requirements_path" }
description_file = "../assets/workflows/build-base/requirements.md"

[steps.check]
max_attempts = 3

[steps.check.check]
mode = "exec"
path = ".gc/scripts/checks/build-artifact-valid.sh"
timeout = "5m"

[[steps]]
id = "plan"
title = "Produce implementation plan"
needs = ["requirements"]
metadata = { "gc.run_target" = "gc.design-author", "gc.build.artifact_schema" = "gc.build.plan.v1", "gc.build.artifact_path_keys" = "gc.build.plan_path,gc.var.plan_path" }
description_file = "../assets/workflows/build-base/plan.md"

[steps.check]
max_attempts = 3

[steps.check.check]
mode = "exec"
path = ".gc/scripts/checks/build-artifact-valid.sh"
timeout = "5m"

[[steps]]
id = "plan-review"
title = "Review implementation plan"
needs = ["plan"]
metadata = { "gc.run_target" = "gc.review-synthesizer" }
description_file = "../assets/workflows/build-base/plan-review.md"

[[steps]]
id = "decompose"
title = "Decompose approved plan"
needs = ["plan-review"]
metadata = { "gc.run_target" = "gc.task-decomposer", "gc.build.artifact_schema" = "gc.build.decomposition.v1", "gc.build.artifact_path_keys" = "gc.build.decomposition_path,gc.var.decomposition_path" }
description_file = "../assets/workflows/build-base/decompose.md"

[steps.check]
max_attempts = 3

[steps.check.check]
mode = "exec"
path = ".gc/scripts/checks/build-artifact-valid.sh"
timeout = "5m"

[[steps]]
id = "implement"
title = "Drain implementation convoy into separate sessions"
needs = ["decompose"]
condition = "{{drain_policy}} == separate"
metadata = { "gc.run_target" = "{{implementation_target}}" }
description_file = "../assets/workflows/build-base/implement.md"

[steps.drain]
context = "separate"
formula = "do-work"
member_access = "exclusive"

[[steps]]
id = "implement-same-session"
title = "Drain implementation convoy in one shared session"
needs = ["decompose"]
condition = "{{drain_policy}} == same-session"
metadata = { "gc.run_target" = "{{implementation_target}}" }
description_file = "../assets/workflows/build-base/implement-same-session.md"

[steps.drain]
context = "shared"
formula = "do-work-item"
on_item_failure = "skip_remaining"
member_access = "exclusive"

[steps.drain.item]
single_lane = true

[[steps]]
id = "summarize-implementation"
title = "Write canonical implementation summary"
needs = ["implement", "implement-same-session"]
metadata = { "gc.run_target" = "gc.run-operator", "gc.build.artifact_schema" = "gc.build.implementation-summary.v1", "gc.build.artifact_path_keys" = "gc.build.implementation_summary_path" }
description_file = "../assets/workflows/build-base/summarize-implementation.md"

[steps.check]
max_attempts = 3

[steps.check.check]
mode = "exec"
path = ".gc/scripts/checks/build-artifact-valid.sh"
timeout = "5m"

[[steps]]
id = "review"
title = "Review implementation"
needs = ["summarize-implementation"]
metadata = { "gc.run_target" = "gc.implementation-reviewer", "gc.build.artifact_schema" = "gc.build.review.v1", "gc.build.artifact_path_keys" = "gc.build.review_report_path" }
description_file = "../assets/workflows/build-base/review.md"

[steps.check]
max_attempts = 3

[steps.check.check]
mode = "exec"
path = ".gc/scripts/checks/build-artifact-valid.sh"
timeout = "5m"

[[steps]]
id = "finalize"
title = "Finalize build result"
needs = ["review"]
metadata = { "gc.run_target" = "gc.run-operator", "gc.build.artifact_schema" = "gc.build.final-report.v1", "gc.build.artifact_path_keys" = "gc.build.final_report_path" }
description_file = "../assets/workflows/build-base/finalize.md"

[steps.check]
max_attempts = 3

[steps.check.check]
mode = "exec"
path = ".gc/scripts/checks/build-artifact-valid.sh"
timeout = "5m"

[[steps]]
id = "publish"
title = "Optionally publish build result"
needs = ["finalize"]
metadata = { "gc.run_target" = "gc.publisher" }
description_file = "../assets/workflows/build-base/publish.md"

[requires]
formula_compiler = ">=2.0.0"
