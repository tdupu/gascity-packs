description = """
Visible internal helper documenting the pack-facing same-session policy. Public
launches should use `implement --var drain_policy=same-session`.

Launch inputs:
- input_convoy: {{convoy_id}}
- context_path: {{context_path}} (empty means no extra context bundle)
- implementation_target: {{implementation_target}}
"""
formula = "same-session-implement"
version = 1
target_required = true
internal = true

[vars]
[vars.context_path]
description = "Optional context bundle path."
default = ""

[vars.implementation_target]
description = "Role target for implementation work."
default = "gc.implementation-worker"

[[steps]]
id = "shared-drain"
title = "Run core shared drain"
metadata = { "gc.run_target" = "{{implementation_target}}" }
description_file = "../assets/workflows/same-session-implement/shared-drain.md"

[steps.drain]
context = "shared"
formula = "do-work-item"
on_item_failure = "skip_remaining"
member_access = "exclusive"

[steps.drain.item]
single_lane = true

[requires]
formula_compiler = ">=2.0.0"
