description = """
Full lifecycle implementation formula for one implementation convoy or a core
drain-unit convoy of size one.

Launch inputs:
- input_convoy: {{convoy_id}}
- context_path: {{context_path}} (empty means no extra context bundle)
- implementation_target: {{implementation_target}}
- summary_path: {{summary_path}} (empty means use the default item summary path)
"""
formula = "do-work"
version = 1
extends = ["implementation-base"]
target_required = true

[vars]
[vars.context_path]
description = "Optional context bundle path."
default = ""

[vars.implementation_target]
description = "Role target for implementation work."
default = "gc.implementation-worker"

[vars.summary_path]
description = "Optional per-item summary path."
default = ""

[[steps]]
id = "prepare-worktree"
title = "Prepare item worktree"
metadata = { "gc.run_target" = "gc.run-operator" }
description_file = "../assets/workflows/do-work/prepare-worktree.md"

[[steps]]
id = "implement"
title = "Implement owned work"
needs = ["prepare-worktree"]
metadata = { "gc.run_target" = "{{implementation_target}}", "gc.build.artifact_schema" = "gc.build.implementation-summary.v1", "gc.build.artifact_path_keys" = "gc.implementation.summary_path,gc.build.implementation_summary_path,gc.var.summary_path" }
description_file = "../assets/workflows/do-work/implement.md"

[steps.check]
max_attempts = 3

[steps.check.check]
mode = "exec"
path = ".gc/scripts/checks/build-artifact-valid.sh"
timeout = "5m"

[[steps]]
id = "close-source-anchor"
title = "Close owned source anchor"
needs = ["implement"]
metadata = { "gc.run_target" = "gc.run-operator" }
description_file = "../assets/workflows/do-work/close-source-anchor.md"

[requires]
formula_compiler = ">=2.0.0"
