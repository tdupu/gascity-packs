description = """
Default Gas City build continuation from implementation evidence.

This cataloged entrypoint extends `build-from-review-base` with the built-in
Gas City methodology defaults.
"""
formula = "build-from-review"
version = 1
extends = ["build-from-review-base"]
target_required = false

[catalog]
name = "build-from-review"
description = "Continue a build from implementation evidence through review, finalization, and optional publish."

[metadata.gc.methodology]
allowed_drain_policies = ["separate", "same-session"]
implementation_strategy = "drain"
interaction_modes = ["interactive", "autonomous", "headless"]
review_modes = ["report", "agent", "interactive"]

[requires]
formula_compiler = ">=2.0.0"
