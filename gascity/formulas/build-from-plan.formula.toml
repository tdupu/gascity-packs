description = """
Default Gas City build continuation from approved requirements.

This cataloged entrypoint extends `build-from-plan-base` with the built-in Gas
City methodology defaults.
"""
formula = "build-from-plan"
version = 1
extends = ["build-from-plan-base"]
target_required = false

[catalog]
name = "build-from-plan"
description = "Continue a build from approved requirements through planning, decomposition, implementation, review, and optional publish."

[metadata.gc.methodology]
allowed_drain_policies = ["separate", "same-session"]
implementation_strategy = "drain"
interaction_modes = ["interactive", "autonomous", "headless"]
review_modes = ["report", "agent", "interactive"]

[requires]
formula_compiler = ">=2.0.0"
