description = """
Starter factory review expansion for build-basic.

This keeps the first-party Gas City build workflow approachable while showing
real fanout/fanin: acceptance, test evidence, and simplicity review lanes
synthesize into one fix loop.
"""
formula = "build-basic-review"
type = "expansion"
version = 1

[vars]
[vars.implementation_target]
description = "Role target used to apply starter review findings."
default = "gc.implementation-worker"

[[template]]
id = "{target}.setup-build-basic-review"
title = "Prepare build-basic starter review"
metadata = { "gc.run_target" = "gc.run-operator" }
description_file = "../assets/workflows/build-basic-review/{target}.setup-build-basic-review.md"

[[template]]
id = "{target}.build-basic-review-loop"
title = "Run build-basic starter review until approved"
needs = ["{target}.setup-build-basic-review"]
metadata = { "gc.run_target" = "gc.run-operator" }
description_file = "../assets/workflows/build-basic-review/{target}.build-basic-review-loop.md"

[template.check]
max_attempts = 6

[template.check.check]
mode = "exec"
path = ".gc/scripts/checks/implementation-review-approved.sh"
timeout = "10m"

[[template.children]]
id = "{target}.acceptance-review"
title = "Starter review: acceptance and correctness"
metadata = { "gc.run_target" = "gc.implementation-reviewer" }
description_file = "../assets/workflows/build-basic-review/{target}.acceptance-review.md"

[[template.children]]
id = "{target}.test-evidence-review"
title = "Starter review: test evidence"
metadata = { "gc.run_target" = "gc.gap-analyst" }
description_file = "../assets/workflows/build-basic-review/{target}.test-evidence-review.md"

[[template.children]]
id = "{target}.simplicity-review"
title = "Starter review: simplicity and maintainability"
metadata = { "gc.run_target" = "gc.design-implementation-reviewer" }
description_file = "../assets/workflows/build-basic-review/{target}.simplicity-review.md"

[[template.children]]
id = "{target}.synthesize-review"
title = "Synthesize starter review"
needs = [
  "{target}.acceptance-review",
  "{target}.test-evidence-review",
  "{target}.simplicity-review",
]
metadata = { "gc.run_target" = "gc.review-synthesizer" }
description_file = "../assets/workflows/build-basic-review/{target}.synthesize-review.md"

[[template.children]]
id = "{target}.apply-review-findings"
title = "Apply starter review findings"
needs = ["{target}.synthesize-review"]
metadata = { "gc.run_target" = "{implementation_target}", "gc.continuation_group" = "build-basic-review-fixes" }
description_file = "../assets/workflows/build-basic-review/{target}.apply-review-findings.md"

[[template]]
id = "{target}"
title = "Finalize build-basic starter review"
needs = ["{target}.build-basic-review-loop"]
metadata = { "gc.run_target" = "gc.run-operator", "gc.build.artifact_schema" = "gc.build.review.v1", "gc.build.artifact_path_keys" = "gc.build.review_report_path" }
description_file = "../assets/workflows/build-basic-review/{target}.md"

[template.check]
max_attempts = 3

[template.check.check]
mode = "exec"
path = ".gc/scripts/checks/build-artifact-valid.sh"
timeout = "5m"

[requires]
formula_compiler = ">=2.0.0"
