description = """
Default Gas City build continuation from requirements creation.

This cataloged entrypoint extends `build-from-requirements-base` with the
built-in Gas City methodology defaults.
"""
formula = "build-from-requirements"
version = 1
extends = ["build-from-requirements-base"]
target_required = false

[catalog]
name = "build-from-requirements"
description = "Run the nested Gas City suffix chain from requirements through optional publish."

[metadata.gc.methodology]
allowed_drain_policies = ["separate", "same-session"]
implementation_strategy = "drain"
interaction_modes = ["interactive", "autonomous", "headless"]
review_modes = ["report", "agent", "interactive"]

[requires]
formula_compiler = ">=2.0.0"
