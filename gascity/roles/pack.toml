[pack]
name = "gc-roles"
version = "0.1.0"
schema = 2

[imports.gc]
source = ".."

# v2 replacement for removed fallback=true mechanism (pack-spec.md:406-408).
# Agents in this pack had `fallback = true` which is silently ignored in v2.
# These [[named_session]] entries restore on-demand dispatch for the build-basic fleet.
# run-operator and review-synthesizer ARE included here — the HQ-level [imports.gc-base]
# exposes the agent templates but does NOT add named_session entries (2026-07-12 fix).

[[named_session]]
template = "design-author"
scope = "rig"
mode = "on_demand"

[[named_session]]
template = "design-implementation-reviewer"
scope = "rig"
mode = "on_demand"

