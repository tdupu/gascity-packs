[order]
description = "Promote or reject one brief whenever the pile has pending markdown briefs"
# gsp-fqo: scope=rig so the condition check runs from each rig's root directory
# and .beads/briefs/.pile resolves correctly. City-scope was causing exits 1
# (path relative to ~/gt, not the rig) and silently disabling the order.
scope = "rig"
formula = "brief-shuffle"
trigger = "condition"
check = "find .beads/briefs/.pile -mindepth 1 -maxdepth 1 -type f -name '*.md' 2>/dev/null | grep -q ."
pool = "gc.run-operator"
timeout = "60s"
idempotent = true

