# gsp-1pv (historical): artifact_root was migrated to ~/.gc/mathcity/briefs
# (absolute home-relative path) and the order made city-scoped. That global
# root was retired by gsp-5h17: the pipeline is rig-relative per
# assets/brief-pipeline/paths.toml, so the city-scoped $HOME/.gc check
# never fired.
#
# gsp-3al3: scope=rig with a rig-relative pile path (mirrors the
# brief-review-patrol gsp-fqo fix). Rig-scoped condition checks run with the
# rig root as cwd (the gc order runtime sets the check's working directory to
# the rig path), so `.beads/briefs/.pile` resolves against each rig —
# matching brief-shuffle's artifact_root default. The formula's empty-pile
# route (gsp-3al3) guarantees a run that finds nothing exits cleanly and
# releases the shuffler lock.
[order]
description = "Promote or reject one brief whenever the pile has pending markdown briefs"
scope = "rig"
formula = "brief-shuffle"
trigger = "condition"
# Pile items are <slug>/brief.md subdirectories (paths.toml: brief = "brief.md"),
# NOT flat *.md files. The prior -mindepth 1 -maxdepth 1 -type f check found
# nothing → the order never fired → auto-promotion was dead. Match depth 2.
check = "find .beads/briefs/.pile -mindepth 2 -maxdepth 2 -type f -name 'brief.md' 2>/dev/null | grep -q ."
pool = "gc.run-operator"
timeout = "60s"
idempotent = true
