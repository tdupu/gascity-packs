[order]
description = "Promote or reject one brief whenever the pile has pending markdown briefs"
# gsp-1pv: migrated artifact_root to ~/.gc/mathcity/briefs (absolute home-relative path);
# scope changed from rig to city since the path no longer needs rig-root resolution.
scope = "city"
formula = "brief-shuffle"
trigger = "condition"
check = "find $HOME/.gc/mathcity/briefs/.pile -mindepth 1 -maxdepth 1 -type f -name '*.md' 2>/dev/null | grep -q ."
pool = "gc.run-operator"
timeout = "60s"
idempotent = true

