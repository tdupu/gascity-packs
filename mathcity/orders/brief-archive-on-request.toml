# Event-trigger order — archive a sent-back brief immediately.
#
# `brief.archive_requested` is rung by file-or-sendback-route when a
# decision routes SEND-BACK (self-contained adjudication, no follow-up).
# Catching it here means sent-back briefs are tidied within minutes
# instead of waiting for the 24h cooldown sweep, which remains in place
# as the backstop for lost events (events are best-effort, not durable).

[order]
description = "Archive sent-back brief artifacts as soon as routing requests it"
scope = "city"
formula = "brief-archive-sweep"
trigger = "event"
on = "brief.archive_requested"
pool = "gc.run-operator"
timeout = "60s"
idempotent = true
