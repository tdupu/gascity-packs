description = """
Single-writer shuffler for brief pile to stack promotion.

This formula is intended for the `brief-shuffle-pile` order. It processes at
most one pile item per run, applies gate-keep rules, and either promotes it to
the stack with a manifest append or rejects it into `.pile/.rejected`.

§E Check-wheel (P1.20) — lock expiry mechanism (v3, 2026-07-23)
Alternatives surveyed before implementing the acquire-lock expiry fix:
  (A) Shell-exec acquire with atomic mv + tmp file — strongest atomicity; requires
      a new .gc/scripts/checks/acquire-shuffle-lock.sh asset and exec check in
      the step; ruled out for this targeted fix (follow-up bead filed for v4).
  (B) Session-liveness check as sole stale criterion — current v2 behavior; proved
      fragile: a sleeping session (mid-formula, waiting for next step dispatch)
      appears dead during brief liveness windows, causing premature lock theft and
      concurrent select-pile-item runs (gt-v3pisq regression observed 2026-07-23).
      Ruled out.
  (C) Time-based expiry field (expires_at = acquired + 5 min) + BOTH-criterion
      stale detection (expired AND dead session) — ADOPTED: additive field,
      backward-compatible, eliminates permanent stall. BOTH required prevents
      premature theft from sleeping (state=asleep) sessions between formula
      steps; 5-min window bounds worst-case stall when a session truly dies.
  (D) Dolt lease bead as lock — architectural redesign, eliminates all file-race
      issues; deferred as v4 scope along with (A).
"""
formula = "brief-shuffle"
# v2 (2026-07-16): reject branch no longer dead-ends — files a remediation
# bead via escalate.sh + emits brief.gate_rejected (QUIMBY 10 S10 finding:
# nothing reads .pile/.rejected/).
# v3 (2026-07-23): acquire-lock adds expires_at (5 min) + dual stale criterion
# (expired AND dead-session — BOTH required; EITHER re-introduces premature theft
# from sleeping sessions); release-lock max_attempts raised 1→3 to survive
# transient manifest check failures.
version = 3

[requires]
formula_compiler = ">=2.0.0"

[catalog]
name = "brief-shuffle"
description = "Promote or reject one brief from .pile according to the gate registry."

[vars]
[vars.artifact_root]
description = "Brief pipeline artifact root."
# Rig-relative: resolves against the rig root (see assets/brief-pipeline/paths.toml).
default = ".beads/briefs"

[vars.operator_target]
description = "Run target for shuffler bookkeeping."
default = "mathcity.brief-operator"  # retargeted from gc.run-operator (gastown retired 2026-07-09 ba2ff381)

[[steps]]
id = "acquire-lock"
title = "Acquire the shuffler lock"
metadata = { "gc.run_target" = "{{operator_target}}", "gc.brief.root" = "{{artifact_root}}" }
description = """
Acquire `{{artifact_root}}/.shuffle.lock` before touching `.pile`, `stack`, or
`stack/.index.jsonl`.

Lock file format — write ALL five fields atomically when acquiring or stealing:
  session:    mathcity__brief-operator-<session-slug>
  bead:       <GC_BEAD_ID>
  step:       brief-shuffle.acquire-lock
  acquired:   <ISO8601 UTC timestamp — now>
  expires_at: <ISO8601 UTC timestamp — now + 5 minutes>

STALE DETECTION — the lock is stale only when BOTH conditions hold:
  (a) `expires_at` is in the past (time-based expiry), AND
  (b) the holder session ID is not present in `gc session list --state active`
      output (not currently running a Claude turn).

WARNING — do NOT use condition (b) alone: a session with state="asleep" does
NOT appear in --state active output, but it may have valid queued formula steps.
Using (b) alone steals from sleeping sessions and causes concurrent
select-pile-item execution (gt-v3pisq regression, 2026-07-23). BOTH conditions
must be true before stealing.

If the lock file is missing or unparseable, treat it as stale and take over.

INVARIANT (P1.17): after at most 5 minutes from `expires_at` plus confirmed
session death, any molecule can safely take over. This bounds stall time to
5 min + death-detection latency while preventing premature theft from sleeping
sessions that still have work queued.

Acquire procedure:
1. Check if `{{artifact_root}}/.shuffle.lock` exists.
2. If YES: read `expires_at` and `session` from the lock file.
   - STALE (BOTH (a) and (b) above): log "stale lock stolen
     (expired + dead session) — former holder: <session>, was: <expires_at>"
     in the step notes; overwrite the lock file with all five fields
     (your session, now, now+5min); proceed.
   - LIVE (either condition false): log "lock not stale — holder: <session>,
     expires: <expires_at>, session-state: active|asleep; NOT acquiring" in
     the step notes; FAIL this step (do not close as success — a successful
     close dispatches select-pile-item without the lock). The
     brief-shuffle-pile order re-fires when the lock is released or expires.
3. If NO: write the lock file (all five fields); proceed.

If the lock file exists but has no `expires_at` field (legacy v2 lock): treat
it as stale only if BOTH: `acquired` is more than 5 minutes ago AND the holder
session is not in `gc session list --state active`.
"""

[[steps]]
id = "select-pile-item"
title = "Select one pile item"
needs = ["acquire-lock"]
metadata = { "gc.run_target" = "{{operator_target}}", "gc.brief.root" = "{{artifact_root}}", "gc.brief.path" = "{{artifact_root}}/.pile" }
description = """
Select the oldest non-hidden markdown brief from `{{artifact_root}}/.pile`.
Process only one item per shuffler run. Leave the item in place until the
promote/reject write is ready so failed runs are restartable.

EMPTY-PILE ROUTE (gsp-3al3): if `.pile` contains no non-hidden markdown
briefs, that is a CLEAN outcome, not a failure. Record `selection: none
(pile empty)` in the step notes and complete this step normally. The
downstream apply-gates and write-disposition steps then pass through as
no-ops and release-lock still releases the shuffler lock — never leave the
graph stranded holding `.shuffle.lock`.
"""

# No mechanical check here (gsp-3al3): the former brief-pile-nonempty.sh
# check made an empty pile a FAILED step, deadlocking the graph (apply-gates
# blocked on the failed dependency and release-lock never ran, leaking the
# lock and the wisp). An empty pile is now a valid clean completion; the
# write-disposition check still enforces that a non-empty run produced a
# promote/reject result.

[[steps]]
id = "apply-gates"
title = "Apply gate registry to selected brief"
needs = ["select-pile-item"]
metadata = { "gc.run_target" = "{{operator_target}}", "gc.brief.root" = "{{artifact_root}}" }
description = """
Apply the gate registry from `assets/brief-pipeline/gates.toml` to the selected
brief. Judgment gates must already be present in the brief; the shuffler does
not invent approvals.

If any required gate fails or is missing, move the brief to
`{{artifact_root}}/.pile/.rejected/<slug>/brief.md` with a short rejection
record. If all gates pass, prepare promotion to stack.

EMPTY-PILE ROUTE (gsp-3al3): if select-pile-item recorded `selection: none
(pile empty)`, this step is a NO-OP — do not touch gates, do not reject or
promote anything; note the pass-through and complete immediately.
"""

[[steps]]
id = "write-disposition"
title = "Promote or reject the selected brief"
needs = ["apply-gates"]
metadata = { "gc.run_target" = "{{operator_target}}", "gc.brief.root" = "{{artifact_root}}" }
description = """
For `Disposition: promote`, move the brief to
`{{artifact_root}}/stack/<slug>.md` and append one JSON object to
`{{artifact_root}}/stack/.index.jsonl` with EXACTLY these keys (the drain
reader brief-drain-manifest.sh keys on `slug`, `gate_profile`, and
`unlock_count`; the others are consumed downstream):

- `slug` — brief slug
- `path` — `{{artifact_root}}/stack/<slug>.md`
- `source` — the source bead id (brief-record-decision copies this into the
  decision record's `source_bead`; the whole approve dispatch depends on it)
- `unlock_count` — integer, drain sort key
- `created_at` — RFC3339 promote time
- `gate_profile` — e.g. `no_brainer` or a full-brief profile

The `status` key is NOT written here; brief-record-decision adds it later
(values `decided`/`archived`).

For `Disposition: reject` or `Disposition: blocked`, move the brief under
`{{artifact_root}}/.pile/.rejected/<slug>/` and do not append to the stack
manifest. A rejection MUST NOT dead-end there (`.rejected/` has no reader) —
perform BOTH send-back actions:

1. File a remediation bead (the same mechanism brief-review-patrol uses):
   `.gc/scripts/escalate.sh --title "[brief-shuffle] gate-rejected: <slug>"
   --body "<failed gates + remediation guidance from the rejection record>"
   --priority 2`. The bead IS the send-back-to-work.
2. Emit `gc event emit brief.gate_rejected --subject <slug>` so future
   routing can act on rejections without another shuffle edit.

(Full auto re-prep routing — reprep-vs-close by rejection type, with a
reject→reprep→reject loop guard — is judgment-bearing and tracked as a
separate follow-up bead; do NOT improvise it here.)

EMPTY-PILE ROUTE (gsp-3al3): if select-pile-item recorded `selection: none
(pile empty)`, this step is a NO-OP — write nothing and complete immediately.
The check below passes on a genuinely empty run (empty pile with no
promote/reject result) while still failing a non-empty run that produced no
disposition.
"""

[steps.check]
max_attempts = 2

[steps.check.check]
mode = "exec"
path = ".gc/scripts/checks/brief-shuffle-result-required.sh"
timeout = "2m"

[[steps]]
id = "release-lock"
title = "Release the shuffler lock"
needs = ["write-disposition"]
metadata = { "gc.run_target" = "{{operator_target}}", "gc.brief.root" = "{{artifact_root}}" }
description = """
Release `{{artifact_root}}/.shuffle.lock`. If the selected item was promoted,
ensure `stack/.index.jsonl` is still valid JSONL and sorted consumers can
select by unlock count.

This step runs on BOTH routes (promote/reject AND the empty-pile no-op
route, gsp-3al3): the lock must always be released when the run ends.

IMPORTANT: Delete the lock file regardless of the manifest check result. If
the manifest check fails (the check below runs after deletion), a follow-up
bead for manifest repair is preferable to leaving the lock stranded. The
lock MUST be released; manifest repair can happen independently.
"""

[steps.check]
max_attempts = 3

[steps.check.check]
mode = "exec"
path = ".gc/scripts/checks/brief-manifest-current.sh"
timeout = "1m"

