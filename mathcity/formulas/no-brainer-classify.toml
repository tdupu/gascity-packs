description = """
Classify and optionally process no-brainer briefs.

This formula is safe by default. It classifies candidates and records the
result; shortcut execution is blocked unless the local kill switch exists and
all stop gates are clear.
"""
formula = "no-brainer-classify"
version = 1

[requires]
formula_compiler = ">=2.0.0"

[catalog]
name = "no-brainer-classify"
description = "Apply the no-brainer brief filter without bypassing stop gates."

[vars]
[vars.brief_path]
description = "Optional path to a brief. Empty means select the next no-brainer candidate from the pile."
default = ""

[vars.artifact_root]
description = "Brief pipeline artifact root."
default = "~/.gc/mathcity/briefs"

[vars.mode]
description = "Classification only or attempt guarded execution."
default = "classify"
enum = ["classify", "guarded-execute"]

[vars.operator_target]
description = "Run target for no-brainer classification."
default = "gastown.mayor"

[[steps]]
id = "load-candidate"
title = "Load no-brainer candidate"
metadata = { "gc.run_target" = "{{operator_target}}", "gc.brief.path" = "{{brief_path}}", "gc.brief.root" = "{{artifact_root}}" }
description = """
Load `{{brief_path}}`. If it is empty, select one candidate brief from
`{{artifact_root}}/.pile` or `{{artifact_root}}/stack` that asks for
no-brainer classification. Do not process more than one candidate in a run.
"""

[[steps]]
id = "enforce-safety-exclusions"
title = "Enforce no-brainer safety exclusions"
needs = ["load-candidate"]
metadata = { "gc.run_target" = "{{operator_target}}", "gc.brief.path" = "{{brief_path}}", "gc.brief.root" = "{{artifact_root}}" }
description = """
Apply server-touching, user-skill-touching, test-execution, LaTeX, and
auto-merge kill-switch exclusions. Any exclusion forces classification to
`not-no-brainer` or `needs-Taylor`.
"""

[steps.check]
max_attempts = 1

[steps.check.check]
mode = "exec"
path = ".gc/scripts/checks/brief-no-brainer-execute-safety.sh"
timeout = "1m"

[[steps]]
id = "classify"
title = "Classify the candidate"
needs = ["enforce-safety-exclusions"]
metadata = { "gc.run_target" = "{{operator_target}}", "gc.brief.path" = "{{brief_path}}", "gc.brief.root" = "{{artifact_root}}" }
description = """
Use `mathcity.catch-no-brainer` (pack skill, v0.1+) and
`no-brainer-brief-filter.md`.

The classifier runs four checks in order (first match wins):
1. Server-touching — `{no_brainer: false, reason: "cat-E-server-touching"}`
2. User-skill-touching (as-wjv override) — `{no_brainer: false, reason: "user-skill-touching-override"}`
3. Capability-blocker shape — `{no_brainer: false, category: "capability-blocker", reason: "resolve <blocker>, then re-classify"}`
4. he-lele 5-criterion (cat-A/B/C/D) — `{no_brainer: true, compact_eligible: true}`
5. Else — `{no_brainer: "candidate", compact_eligible: false}`

Record exactly one classification:

- `no-brainer` (cat-A/B/C/D match, compact eligible)
- `capability-blocker` (routes to Taylor for blocker resolution, not full-form presentation)
- `not-no-brainer`
- `needs-Taylor`

Also record the `compact_eligible` boolean from the verdict — downstream
`brief-present-next` uses it to select the compact vs full presentation shape.
The classification must cite the gate evidence that permits or blocks shortcut
handling.
"""

[[steps]]
id = "guarded-execute"
title = "Guarded no-brainer execution"
needs = ["classify"]
condition = "{{mode}} == guarded-execute"
metadata = { "gc.run_target" = "{{operator_target}}", "gc.brief.path" = "{{brief_path}}", "gc.brief.root" = "{{artifact_root}}" }
description = """
Execute only if classification is `no-brainer`, all stop gates are clear, and
no N5 kill switch is engaged. Kill-switch hierarchy (POLICY.md N5, Adopted
2026-07-12; auto-execute is the DEFAULT): check `~/gt/.beads/auto_merge_enabled`
(city-wide), then `<rig_root>/.beads/auto_merge_enabled` (rig-level) — a flag
file that exists and reads `false` halts execution and routes the brief to the
pile in compact form for Taylor; absent or `true` proceeds. Stop gates and
non-no-brainer classifications route the brief to Taylor as before.
"""

[steps.check]
max_attempts = 1

[steps.check.check]
mode = "exec"
path = ".gc/scripts/checks/brief-no-brainer-safety.sh"
timeout = "1m"

[[steps]]
id = "record-classification"
title = "Record no-brainer classification"
needs = ["classify", "guarded-execute"]
metadata = { "gc.run_target" = "{{operator_target}}", "gc.brief.path" = "{{brief_path}}", "gc.brief.root" = "{{artifact_root}}" }
description = """
Record the classification and any guarded execution result in the brief record.
Include the `compact_eligible` field from the `mathcity.catch-no-brainer`
verdict so `brief-present-next` can select the compact form when appropriate.
If execution did not occur, leave the brief in the normal Taylor presentation
path.
"""
