description = """
Post-merge brief-record duty: inspect recently closed beads and, for those
carrying the `needs-decision` label, create a brief-record bead and enter the
brief-prep pipeline.

Fired by the `on-merge-brief-record` order (event trigger on `bead.closed`).

## Decision logic (verbatim per task-2-brief §2)

After a successful merge of bead X:
  (a) X is already closed by the refinery (existing behavior — no action).
  (b) IF X carries the `needs-decision` label:
      - Create a brief-record bead titled `[brief-record] <X-id> <X-title>`
        with `metadata.source_bead = X-id`.
      - Touch the brief-prep pipeline by creating a brief-prep work bead
        using the brief-prep formula's intake convention:
          source  = X-id   (the just-closed bead)
          brief_slug = `brief-<X-id>` (stable slug derived from source bead)
          brief_type = "decision"
  (c) IF X is unlabeled (no `needs-decision`): do nothing extra.

## Why vapor

All operations are deterministic bd CLI commands — no judgment required.
The formula runs as a single shell script (phase=vapor) so scan, dedup,
create, and pipeline-touch stay in one process without burning an LLM turn
per step. Variable state crosses steps trivially within the same shell.

## Wake-up contract

This formula is a WAKE-UP, not a single-bead handler. The `bead.closed`
event is a signal; the controller passes no event-derived bead id into the
formula. We do a durable-state scan: list recently closed `needs-decision`
beads and create brief-records for the ones that don't have one yet.
"""
formula = "on-merge-brief-record"
phase = "vapor"
version = 1

[catalog]
name = "on-merge-brief-record"
description = "Post-merge hook: create a brief-record and enter brief-prep when a closed bead carries needs-decision."

[vars]
[vars.prep_target]
description = "Run target for brief-prep bookkeeping steps."
default = "mathcity.brief-operator"  # retargeted from gc.run-operator (gastown retired 2026-07-09 ba2ff381)

[vars.artifact_root]
description = "Brief pipeline artifact root relative to the city or rig root."
# Rig-relative: resolves against the rig root (see assets/brief-pipeline/paths.toml).
default = ".beads/briefs"

[[steps]]
id = "scan-and-record"
title = "Scan closed needs-decision beads and create brief-records"
metadata = { "gc.run_target" = "{{prep_target}}" }
description = """
Run this as one shell script so every derived value (CLOSED_IDS, MISSING,
SLUG) remains in the same process without relying on cross-step variables.

```bash
set -euo pipefail
WORK_BEAD="${GC_BEAD_ID:-}"
DRAIN_ACKED=0

drain_ack_once() {
  if [ "$DRAIN_ACKED" -ne 1 ]; then
    gc runtime drain-ack || true
    DRAIN_ACKED=1
  fi
}

trap 'drain_ack_once' EXIT

# ── Step 0: scan recently closed needs-decision beads ─────────────────────
SINCE="$(date -u -v-30d '+%Y-%m-%d' 2>/dev/null || date -u -d '30 days ago' '+%Y-%m-%d' 2>/dev/null || echo '1970-01-01')"
CLOSED_IDS=$(bd list --status closed --label needs-decision \
  --closed-after "$SINCE" --json 2>/dev/null | jq -r '.[].id // empty')
if [ -z "$CLOSED_IDS" ]; then
  echo "no recently closed needs-decision beads; nothing to do"
  if [ -n "$WORK_BEAD" ]; then
    bd close "$WORK_BEAD" --reason "on-merge-brief-record: no recently closed needs-decision beads"
  fi
  drain_ack_once
  exit 0
fi
echo "CLOSED_IDS=$CLOSED_IDS"

# ── Step 1: dedup — exact metadata match; fail CLOSED on error ───────────
# Returns: 0=exists, 1=not-found, 2=unknown/error
has_record() {
  local out
  if ! out=$(bd list --all --limit 0 --metadata-field source_bead="$1" --json 2>/dev/null); then
    return 2
  fi
  local n
  if ! n=$(printf '%s' "$out" | jq -er 'if type=="array" then length else error("not array") end' 2>/dev/null); then
    return 2
  fi
  [ "$n" -gt 0 ] && return 0 || return 1
}

# ── Steps 1-3: single pass per closed id: dedup, create, pipeline-touch ──
any_missing=0
processed=0

while IFS= read -r CLOSED_ID; do
  [ -z "$CLOSED_ID" ] && continue

  # Check existence; skip on error (fail-closed).
  has_rc=0
  if has_record "$CLOSED_ID"; then
    has_rc=0
  else
    has_rc=$?
  fi

  if [ "$has_rc" -eq 0 ]; then
    echo "brief-record already exists for $CLOSED_ID; skipping"
    continue
  elif [ "$has_rc" -eq 2 ]; then
    echo "WARNING: has_record check failed for $CLOSED_ID (bd error); skipping this id this run" >&2
    continue
  fi

  # has_rc == 1: no record found — safe to create.
  any_missing=1

  # Re-check immediately before create (guard against concurrent fires).
  has_rc2=0
  if has_record "$CLOSED_ID"; then
    has_rc2=0
  else
    has_rc2=$?
  fi

  if [ "$has_rc2" -eq 0 ]; then
    echo "brief-record appeared between checks for $CLOSED_ID; skipping"
    continue
  elif [ "$has_rc2" -eq 2 ]; then
    echo "WARNING: pre-create has_record check failed for $CLOSED_ID; skipping this id this run" >&2
    continue
  fi

  BEAD_TITLE=$(bd show "$CLOSED_ID" --json | jq -r '.[0].title // ""')
  BRIEF_RECORD=$(bd create \
    --type=task \
    --title="[brief-record] $CLOSED_ID $BEAD_TITLE" \
    --metadata "$(jq -n --arg sb "$CLOSED_ID" '{source_bead: $sb}')" \
    --json | jq -r '.id')
  if [ -z "$BRIEF_RECORD" ]; then
    echo "ERROR: failed to create brief-record bead for $CLOSED_ID" >&2
    exit 1
  fi
  echo "brief-record bead created: $BRIEF_RECORD (source_bead: $CLOSED_ID)"

  # Touch the brief-prep pipeline.
  SLUG="brief-${CLOSED_ID}"
  if bd mol pour brief-prep \
      --var source="$CLOSED_ID" \
      --var brief_slug="$SLUG" \
      --var brief_type="decision"; then
    echo "poured brief-prep for $SLUG"
  else
    # Fallback — create the intake work bead directly.
    bd create \
      --type=task \
      --title="[brief-prep] $SLUG" \
      --metadata "$(jq -n --arg s "$CLOSED_ID" --arg sl "$SLUG" --arg p "{{artifact_root}}/.staging/$SLUG/brief.md" \
        '{"gc.brief.source": $s, "gc.brief.slug": $sl, "gc.brief.type": "decision", "gc.brief.path": $p}')"
    echo "brief-prep work bead created for slug $SLUG"
  fi
  processed=$((processed + 1))

done < <(printf '%s\n' "$CLOSED_IDS")

if [ "$any_missing" -eq 0 ]; then
  echo "all closed needs-decision beads already have brief-records; nothing to do"
  if [ -n "$WORK_BEAD" ]; then
    bd close "$WORK_BEAD" --reason "on-merge-brief-record: all beads already have brief-records"
  fi
  drain_ack_once
  exit 0
fi

if [ -n "$WORK_BEAD" ]; then
  bd close "$WORK_BEAD" --reason "on-merge-brief-record: processed=$processed"
fi
drain_ack_once
exit 0
```

**Exit criteria:** script exits 0; brief-record beads created (keyed on
`metadata.source_bead`, exact match, fail-closed on error) for every
missing needs-decision bead; brief-prep pipeline touched for newly created
records only; work bead closed if GC_BEAD_ID is set; drain-ack sent."""
