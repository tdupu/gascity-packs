description = "Pack-local operator that runs the deterministic brief-pipeline machine steps (shuffle bookkeeping, watchdog refill measurement, decision dispatch, archive sweeps, no-brainer classification). Never adjudicates, never presents to Taylor."
scope = "city"
wake_mode = "fresh"
work_dir = "{{.AgentBase}}"
nudge = "Run gc hook --claim --json now; if it returns a brief-pipeline machine step, execute the claimed formula immediately."
idle_timeout = "2h"
# Persistent city-scope pool so brief-pipeline orders staff deterministically
# without relying on on_demand dispatch (open bug gs-7mr). At least one
# session stays warm; scale up to two under load.
min_active_sessions = 1
max_active_sessions = 2
