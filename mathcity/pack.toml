[pack]
name = "mathcity"
version = "0.2.0"
schema = 2
description = "Taylor-local mathematical work pack, including the brief pipeline formulas, orders, and gate policy registry."

[providers.codex]
base = "builtin:codex"

# WS-A #3 fix (MAYOR-HANDOFF-throughput-plan.md, 2026-07-23, gsp-yxj8r).
# Invariant: at least one control-dispatcher session exists per rig at all times,
# independent of demand probes, restart state, or first-tick latency.
[[named_session]]
template = "control-dispatcher"
scope = "rig"
mode = "always"
