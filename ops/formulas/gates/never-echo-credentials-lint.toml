description = """
Gate formula — refuse to publish any agent-produced artifact that
contains literal credentials (tokens, PATs, API keys, private-key
blocks).

**STATUS: Phase 1 scaffold.** Gate logic lands in subsequent phases;
description-only here.

## Purpose

Pre-publication defense at the **agent-output layer**: catches
credential leaks BEFORE content reaches commit, mail body, brief
deposit, pack-content write, or any other publication surface. Pairs
with the existing pre-push gitleaks hooks on `gascity-packs` /
`gascity` (which guard the git-push layer) — both layers are needed
because `gascity-packs` is public and a leaked credential in a draft
brief or pack-content artifact is harmful even before it reaches a
push pipe.

Codifies `[[never-echo-credentials]]` (the discipline memory): agents
must never expose tokens / PATs / keys via stdout, argv, files,
history, or screenshots. Established after a real leak incident
(cozy's grep leak, 2026-06-22). Sibling to `[[as-wjv]]` SAFETY
OVERRIDE (skill-level credential checks; same policy, different scope).

Pairs with the planned `as-wjv-dispatch-gate` formula per
[[gate-keep-architecture]]'s X-policy + X-gate + improve-X trinity:
the policy is `[[never-echo-credentials]]`; the gate is THIS file
(pre-publication artifact check); the improve-X path is the parent
formula's refusal-to-publish (block + Mayor mail) so the artifact
returns to the producing step for credential redaction before another
publication attempt.

## Boundary clarification

| Layer | Check | Tool |
|---|---|---|
| Agent-output (THIS gate) | Scan artifact text BEFORE publication forms | `gitleaks` + custom-pattern check |
| Git-push (existing hook) | Scan push commit range | `pre-push` hook (gitleaks) |

Both layers needed:
- `gascity-packs` is PUBLIC — agent-output layer catches BEFORE the
  artifact even becomes a commit (commit history is forever).
- Push-hook layer is the last-mile defense if the agent-output gate is
  bypassed or not yet wired into the producing formula.

## Contract

  CHECK: for an artifact identified by `metadata.artifact_path` (or
         `metadata.artifact_text` for in-memory content):

         1. **gitleaks scan** of the artifact (one-shot
            `gitleaks detect --no-git --source <path>` or stdin form
            for `artifact_text`) against the repo's gitleaks config
            (inherits `.gitleaksignore` per `[[as-jnf]]` precedent).

         2. **Custom-pattern check** for high-signal credential
            shapes that gitleaks may miss in non-commit contexts:
              - GitHub PATs: `ghp_*`, `ghs_*`, `gho_*`, `ghu_*`, `ghr_*`
              - AWS access keys: `AKIA[0-9A-Z]{16}`, `ASIA[0-9A-Z]{16}`
              - Generic API key shapes near `key=`, `token=`, `secret=`
                lines with non-placeholder values
              - Private-key blocks: `-----BEGIN [A-Z ]*PRIVATE KEY-----`

         3. **Documentation-placeholder allowlist** (per
            `[[as-jnf]]` precedent): permit literal placeholder strings
            that appear in published documentation or examples —
              - `xoxb-YOUR-TOKEN` (Slack placeholder shape)
              - `ghp_YOUR_TOKEN_HERE` (GitHub PAT placeholder shape)
              - `-----BEGIN PRIVATE KEY-----\\n...\\n-----END PRIVATE KEY-----\\n`
                (JSON-schema example shape for `github-intake.github-app-identity.v1`)
              - Base-64 strings explicitly tagged as
                `# rfc-canonical-example` or `# placeholder`
            Allowlist entries follow the same fingerprint shape as
            `.gitleaksignore` so the two layers stay consistent.

         4. **Env-var-name pass-through**: literal env-var NAMES are
            allowed (`GITHUB_TOKEN`, `AWS_SECRET_ACCESS_KEY`, etc.);
            literal VALUES are blocked. Distinguishing the two is a
            text-shape check — env-var names are
            `[A-Z_][A-Z0-9_]*` standalone tokens; values are anything
            that looks like a structured secret (high-entropy strings,
            base-64 with sufficient length, etc.).

  ON FAIL: gate exits non-zero with stderr listing the artifact path
           and a REDACTED finding (rule name + line number; NEVER the
           literal credential — per `[[never-echo-credentials]]` the
           gate's own output must not echo the secret):

             `GATE-REJECT: never-echo-credentials-lint
              - <artifact-path>:<line>: rule=<rule-name>`

           Parent formula owns the consequence: stamp
           `metadata.credential_leak_blocked = "never-echo-credentials-lint"`,
           mail Mayor, refuse to advance the artifact to the
           publication step. The artifact stays in the producing
           step's state for credential redaction.

  ON ALLOW (with warn): borderline matches that look placeholder-shape
           but appear in a production-shaped context (e.g., a
           `xoxb-`-prefixed string in a `mail-body` field rather than
           a docs example) emit a `GATE-WARN: ...` line on stderr but
           exit 0. The parent formula MAY surface the warn line to the
           agent for self-review without blocking.

## Composes with

- `mol-brief-prep.compose-brief` (pre-deposit: scan the composed brief
  text BEFORE it's written to `{{brief_stack_path}}`).
- `mol-brief-prep.run-tests` (pre-§5: scan captured test STDOUT BEFORE
  it's quoted as evidence — debug logs often carry tokens).
- `mol-mayor-q-brief` (Phase 1 sibling per `[[as-da9n]]`): scan the
  composed mayor-question brief BEFORE it's submitted as a brief.
- Existing pre-push gitleaks hook on `gascity-packs` (narrowed via
  `[[as-du4u]]` to push-range scope; THIS gate fires earlier in the
  lifecycle so the leak never becomes a commit).
- Existing pre-push gitleaks hook on `gascity` (narrowed via
  `[[as-zjbb]]`).
- `as-wjv-dispatch-gate` (Phase 1 sibling per `[[as-oat3]]`):
  skill-level SAFETY OVERRIDE check; this gate is the artifact-level
  complement.
- Brief-pipeline `[[brief-test-evidence-required]]` (§5 evidence
  redaction — this gate is the runtime enforcement of that policy's
  privacy clause).
- `[[codification-preserves-brief-pipeline]]` Guardrail 1
  (codification preserves discipline — the discipline memory
  `[[never-echo-credentials]]` stays operational; this gate is its
  runtime form).

## Cross-references

- `[[never-echo-credentials]]` — source memory (the discipline this
  gate enforces at runtime).
- `[[as-jnf]]` — `.gitleaksignore` precedent (Taylor-approved
  allowlist shape for documentation placeholders); allowlist entries
  in this gate share the same fingerprint format so the two layers
  stay consistent.
- `[[as-zjbb]]` / `[[as-du4u]]` — pre-push gitleaks hook narrowing
  (push-range scope); push-hook is the layer this gate composes with,
  not replaces.
- `[[as-wjv]]` — SAFETY OVERRIDE skill-level credential check
  (sibling policy at the skill layer).
- `[[gate-keep-architecture]]` — X-policy + X-gate + improve-X
  trinity.
- `[[codification-preserves-brief-pipeline]]` Guardrail 1.
- `[[brief-test-evidence-required]]` — §5 evidence redaction policy
  this gate's runtime form supports.
"""
formula = "never-echo-credentials-lint"
version = 1
kind = "gate"

[requires]
formula_compiler = ">=2.0.0"

[[steps]]
id = "check"
title = "Assert artifact text contains no literal credentials per never-echo-credentials policy"
description = """
**STUB — Phase 1.** Logic lands in subsequent phases.

Intended behaviour:

  1. Read the artifact path from `metadata.artifact_path` on the
     request-bead, OR read the artifact body from
     `metadata.artifact_text` for in-memory content (briefs, mail
     bodies, draft commit messages).
  2. Resolve the gitleaks ruleset path:
     - First: repo-root `.gitleaks.toml` if present.
     - Else: bundled default ruleset shipped with this gate at
       `{{pack_assets_dir}}/never-echo-credentials.gitleaks.toml`
       (Phase 2 lands the file; Phase 1 stub references it).
  3. Resolve the allowlist (`.gitleaksignore` shape per `[[as-jnf]]`):
     - Repo-root `.gitleaksignore` (precedence: same as gitleaks).
     - Plus the bundled pack-level allowlist for documentation
       placeholders shipped with this gate at
       `{{pack_assets_dir}}/never-echo-credentials.gitleaksignore`
       (Phase 2 lands the file).
  4. Run gitleaks:
     - File mode: `gitleaks detect --no-git --source <artifact_path>
        --config <ruleset> --gitleaks-ignore-path <allowlist>`.
     - Text mode: pipe `metadata.artifact_text` to
       `gitleaks detect --pipe --config <ruleset>
        --gitleaks-ignore-path <allowlist>`.
  5. Run the custom-pattern check (Phase 2 lands the pattern file at
     `{{pack_assets_dir}}/never-echo-credentials-patterns.yaml`):
     - PATs (`ghp_*`, `ghs_*`, `gho_*`, `ghu_*`, `ghr_*`),
       AWS keys (`AKIA[0-9A-Z]{16}`, `ASIA[0-9A-Z]{16}`),
       generic-api-key shapes near `key=` / `token=` / `secret=`,
       private-key blocks.
     - Allowlist suppresses placeholder shapes (`xoxb-YOUR-TOKEN`,
       `ghp_YOUR_TOKEN_HERE`, RFC-canonical examples flagged with
       `# rfc-canonical-example` / `# placeholder` markers).
  6. On any unsuppressed finding:
     - Exit code 1.
     - stderr: redacted finding(s) — rule name + line number ONLY;
       NEVER the matched substring (per `[[never-echo-credentials]]`
       — gate output must not echo the secret either):
         `GATE-REJECT: never-echo-credentials-lint
          - <artifact-path>:<line>: rule=<rule-name>`
  7. On borderline match (placeholder-shape in non-docs context):
     - Exit code 0 (ALLOW).
     - stderr: warn line (also redacted):
         `GATE-WARN: never-echo-credentials-lint
          - <artifact-path>:<line>: rule=<rule-name>
            (placeholder shape in production-shaped context;
             confirm by self-review)`
  8. Else: exit 0 silently.

Per `[[never-echo-credentials]]` the gate is single-pass and
read-only (no metadata writes). Parent formula owns the consequence
(stamp `credential_leak_blocked = "never-echo-credentials-lint"`,
mail Mayor, refuse to advance the artifact to the publication step).

Privacy guard for gate output: stderr writes the artifact PATH +
rule NAME + line NUMBER only. The matched literal is NEVER echoed —
not in REJECT lines, not in WARN lines, not in any progress output.
The whole point of the gate is to keep credentials out of any
durable surface; gate output IS a durable surface (it lands in the
parent formula's structured-log + the request-bead's
`gate_output_tail`).
"""
