description = """
Per-iteration convergence check for the META-FP loop that drives
`coordinate-review` (and any other artifact-shaping skill that wants
the same guarantee).

**STATUS: Phase 1 scaffold.** Step bodies are description-only; the
runnable convergence machinery lands in Phase 8d. The shape, contract,
and per-verdict actions are normative now so the calling skill
(coordinate-review, fp-finder-skill, future siblings) can target a
stable contract.

## What META-FP is

A bounded fixed-point search for "this artifact is good enough." Each
iteration produces a candidate revision; the formula returns one of:

  - `ACCEPT_REVISION` — revision passed every gate; loop continues
    with the new candidate.
  - `SPLIT_INTO_SIBLING` — revision could not shrink and must instead
    factor a chunk into a sibling artifact; loop continues with the
    factored pair.
  - `TERMINATE_CONVERGED` — both create-artifact and critical-review
    agents returned APPROVING; loop ends with the current candidate.
  - `TERMINATE_CAP` — round count or wall-time exceeded; loop ends
    with the BEST candidate seen so far (highest review score).
  - `REJECT_AND_RETRY` — revision broke quality floor (NOT APPROVING)
    or monotone gate (grew without splitting); skill re-runs the
    revision step with the prior candidate.

The calling skill loops on the formula's verdict, not on its own
counter — defense-in-depth against a skill that "forgets" to check.

## The two convergence guarantees

The math:

1. **Mathematical guarantee** — per-skill char-count strictly
   decreases each accepted iteration (per `[[as-bb5]]`). Char-count is
   bounded below by 0; therefore any infinite sequence of accepted
   iterations contradicts the monotone-decrease invariant; therefore
   the loop terminates. (Bounded monotone → convergent.)

2. **Defense-in-depth** — cap=10 rounds (per Taylor 2026-06-25 verdict
   on as-h7r: "Let's do cap=10. Then I agree with the brief.") + a
   15-minute wall-time gate. These exist as belt-and-brace; if the
   monotone gate is buggy or the artifact dodges the gate, the cap
   still terminates the loop.

The cap is **defense-in-depth on top of** the mathematical guarantee —
NOT a replacement for it. A run that hits cap=10 without converging is
a `TERMINATE_CAP` outcome, which is a SIGNAL that the artifact + gates
need tuning. The mail to the calling skill records cap-hit so the
skill can surface it as a "convergence smell" mark on the artifact.

## Contract (per iteration)

  IN (env vars / formula args):
    - `META_FP_ARTIFACT_PATH`  — absolute path to artifact under FP.
    - `META_FP_ITERATION`      — integer ≥ 1 (this iteration).
    - `META_FP_PREV_CHARS`     — char-count of artifact at end of
                                  previous iteration (or initial size
                                  for iteration 1).
    - `META_FP_NEW_CHARS`      — char-count of candidate revision.
    - `META_FP_SPLIT_PRESENT`  — "true" iff candidate also produced a
                                  sibling artifact (split path).
    - `META_FP_REVIEW_VERDICT` — "APPROVING" | "NEEDS-REVISION" from
                                  critical-review subagent.
    - `META_FP_CREATE_VERDICT` — "APPROVING" | "NEEDS-REVISION" from
                                  create-artifact / revise-artifact
                                  subagent.
    - `META_FP_WALL_START`     — ISO-8601 timestamp of iteration 1
                                  start.

  OUT (stdout JSON-line):
    {"verdict":"ACCEPT_REVISION|SPLIT_INTO_SIBLING|TERMINATE_CONVERGED|TERMINATE_CAP|REJECT_AND_RETRY",
     "reason":"<text>",
     "iteration":<int>,
     "chars_delta":<int|null>,
     "wall_elapsed_s":<int>,
     "cap_hit":<bool>,
     "formula_version":"1"}

Single-pass per fire (per
`[[dispatcher-policy-no-infinite-loop]]`). The calling skill owns the
loop; this formula owns the per-iteration decision.

## Composition

- `[[catch-no-brainer]]` — the FP-converged artifact may itself
  become a brief that the no-brainer classifier later sees; nothing
  to do here.
- `as-4i8` no-brainer-cycle (sibling formula in this pack) — both
  are codification-class formulas for the brief-pipeline ecosystem;
  shape n=3 of
  `[[gascity-orders-and-formulas-decomposition-pattern]]`.
- `gate-sweep` (core pack) — the formula's gate violations stamp
  short-lived gates the skill polls; gate-sweep reaps stale entries.
- `as-bb5` — the mathematical source of the monotone-shrink
  guarantee. Lifts as-bb5's `fp-finder-skill` SKILL.md rule into a
  reusable framework formula.
- `coordinate-review` SKILL.md (agent-skills) — first consumer; it
  drives the loop and calls this formula per iteration.

## Cross-references

- `[[as-bb5]]` — shrink-OR-split rule source (CLOSED).
- `as-h7r` — merged brief; Taylor verdict B+D+F + cap=10 (MERGED).
- `as-2h0` — parent impl bead for the META-FP rewrite (this work).
- `as-gz0n` — SAFETY OVERRIDE gate for the SKILL.md install
  (Part 1; Part 2 = this formula).
- `as-4i8` — sibling formula in this pack (no-brainer-cycle).
- `[[gascity-orders-and-formulas-decomposition-pattern]]` — n=3.
- `[[gate-keep-architecture]]` trinity — X-gate = the two gate
  formulas in this pack; X-policy = the constants in `[vars]`;
  improve-X = the calling skill's revision loop.
- `[[never-echo-credentials]]` — the stdout JSON-line never echoes
  artifact contents, only metadata (path, char count, verdict).
"""
formula = "meta-fp-cycle"
version = 1

[requires]
formula_compiler = ">=2.0.0"

[vars]
[vars.binding_prefix]
description = "Import binding prefix when ops/ is consumed via another pack's [imports.ops]."
default = ""

[vars.round_cap]
description = "Defense-in-depth cap on iterations. Per Taylor 2026-06-25 verdict on as-h7r: cap=10."
default = 10

[vars.wall_time_max]
description = "Defense-in-depth wall-clock cap per FP loop. Default 15min per as-h7r §criterion-3."
default = "15m"

[[steps]]
id = "envelope-check"
title = "Validate iteration envelope (args present + sane)"
description = """
**STUB — Phase 1.** Behaviour lands in Phase 8d.

Intended behaviour:

  1. Assert all required env vars are set (META_FP_ARTIFACT_PATH,
     META_FP_ITERATION, META_FP_PREV_CHARS, META_FP_NEW_CHARS,
     META_FP_SPLIT_PRESENT, META_FP_REVIEW_VERDICT,
     META_FP_CREATE_VERDICT, META_FP_WALL_START).
  2. Assert META_FP_ITERATION is a positive integer.
  3. Assert META_FP_PREV_CHARS and META_FP_NEW_CHARS are non-negative
     integers (PREV ≥ 0, NEW ≥ 0).
  4. Assert META_FP_REVIEW_VERDICT and META_FP_CREATE_VERDICT are in
     the enumerated set {APPROVING, NEEDS-REVISION}.
  5. On any failure: emit
     `{"verdict":"REJECT_AND_RETRY","reason":"envelope: <field> invalid"}`
     to stdout; exit 0 (skill resubmits with corrected args; this
     is not a fatal error).

Envelope failure is NOT termination — the calling skill may have
botched its args. The skill rebuilds the env and re-invokes.
"""

[[steps]]
id = "wall-time-gate"
title = "Defense-in-depth: terminate if wall-time exceeded"
needs = ["envelope-check"]
description = """
**STUB — Phase 1.** Behaviour lands in Phase 8d.

Intended behaviour:

  1. Compute `elapsed = now() - META_FP_WALL_START` (seconds).
  2. If `elapsed > {{wall_time_max}}` (parse to seconds):
       emit `{"verdict":"TERMINATE_CAP","reason":"wall_time exceeded
       <elapsed>s > <max>s","cap_hit":true,"wall_elapsed_s":<elapsed>}`
       and exit 0.
  3. Else: continue.

The cap is for safety; the math gate guarantees termination. A
wall-time hit is a signal to the skill that the artifact + gates need
tuning, NOT a normal exit.
"""

[[steps]]
id = "cap-check"
title = "Defense-in-depth: terminate if iteration count exceeds cap"
needs = ["wall-time-gate"]
description = """
**STUB — Phase 1.** Behaviour lands in Phase 8d.

Intended behaviour:

  1. If `META_FP_ITERATION > {{round_cap}}`:
       emit `{"verdict":"TERMINATE_CAP","reason":"iteration <N> >
       cap <{{round_cap}}>","cap_hit":true}` and exit 0.
  2. Else: continue.

Per Taylor 2026-06-25 verdict on as-h7r: cap=10. Defense-in-depth on
top of the mathematical convergence guarantee (monotone-shrink). A
cap-hit means the math gate failed to converge in 10 rounds; record
the smell on the artifact.
"""

[[steps]]
id = "converged-check"
title = "Mutual APPROVING → TERMINATE_CONVERGED"
needs = ["cap-check"]
description = """
**STUB — Phase 1.** Behaviour lands in Phase 8d.

Intended behaviour:

  1. If `META_FP_CREATE_VERDICT == \"APPROVING\"` AND
     `META_FP_REVIEW_VERDICT == \"APPROVING\"`:
       emit `{\"verdict\":\"TERMINATE_CONVERGED\",
              \"reason\":\"create + review both APPROVING\",
              \"iteration\":<N>,\"chars_delta\":<delta>}`
       and exit 0.
  2. Else: continue.

Mutual APPROVING is the formal stop condition — both the creator and
the reviewer agree the artifact is good. The loop terminates with
this candidate as the final answer.
"""

[[steps]]
id = "shrink-or-split-gate"
title = "Mathematical guarantee: monotone shrink OR factor-out split"
needs = ["converged-check"]
description = """
**STUB — Phase 1.** Behaviour lands in Phase 8d.

Intended behaviour (gate logic from
`gates/iteration-must-shrink-or-split.toml`):

  1. If `META_FP_NEW_CHARS < META_FP_PREV_CHARS`:
       Path A — strict shrink. Continue to quality-floor-gate.
  2. Elif `META_FP_SPLIT_PRESENT == \"true\"`:
       Path B — split into sibling. The candidate did not shrink,
       but it produced a sibling artifact. Continue to
       quality-floor-gate. (Each individual artifact still has to
       satisfy the per-skill char-decrease gate against its prior
       version on FUTURE iterations; baseline for a new sibling is
       its initial size.)
  3. Else:
       Gate FAIL. emit `{\"verdict\":\"REJECT_AND_RETRY\",
       \"reason\":\"shrink-or-split: new (<NEW>) >= prev (<PREV>)
       without split\",\"chars_delta\":<delta>}` and exit 0.

The shrink-OR-split rule is the mathematical convergence guarantee.
Without it, the loop has no termination proof.
"""

[[steps]]
id = "quality-floor-gate"
title = "Quality floor: revision wins ONLY if APPROVING per critical-review"
needs = ["shrink-or-split-gate"]
description = """
**STUB — Phase 1.** Behaviour lands in Phase 8d.

Intended behaviour (gate logic from
`gates/iteration-must-be-approving.toml`):

  1. If `META_FP_REVIEW_VERDICT == \"APPROVING\"`:
       Gate PASS. Continue to verdict-emit.
  2. Else:
       Gate FAIL. emit `{\"verdict\":\"REJECT_AND_RETRY\",
       \"reason\":\"quality_floor: critical-review verdict
       <VERDICT> != APPROVING\"}` and exit 0.

Per as-bb5 §Quality floor: \"A revision wins the gate only if it is
shorter AND still APPROVING per critical-review. Prevents
trivial-deletion gaming.\" Without this gate, a creator could pass
the shrink check by deleting random content.
"""

[[steps]]
id = "verdict-emit"
title = "Emit ACCEPT_REVISION or SPLIT_INTO_SIBLING verdict"
needs = ["quality-floor-gate"]
description = """
**STUB — Phase 1.** Behaviour lands in Phase 8d.

Intended behaviour:

  1. If `META_FP_SPLIT_PRESENT == \"true\"`:
       emit `{\"verdict\":\"SPLIT_INTO_SIBLING\",
       \"reason\":\"accepted: split into sibling artifact\",
       \"iteration\":<N>,\"chars_delta\":<delta>,\"cap_hit\":false}`
       and exit 0.
  2. Else (strict shrink path):
       emit `{\"verdict\":\"ACCEPT_REVISION\",
       \"reason\":\"accepted: shrunk by <delta> chars\",
       \"iteration\":<N>,\"chars_delta\":<delta>,\"cap_hit\":false}`
       and exit 0.

The skill consumes the verdict, updates its loop state (artifact +
char-count), and either continues or terminates per the verdict
string.
"""
