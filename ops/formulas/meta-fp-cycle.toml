description = """
Per-iteration convergence check for the META-FP loop that drives
`coordinate-review` (and any other artifact-shaping skill that wants
the same guarantee).

**STATUS: Phase 8d (runnable).** Step bodies are runnable bash. The
contract, shape, and per-verdict actions are unchanged from the Phase 1
scaffold; this phase makes each step a self-contained bash block that
the calling skill executes sequentially. The first step to emit a
JSON verdict (single line on stdout) terminates execution for this
iteration.

## What META-FP is

A bounded fixed-point search for "this artifact is good enough." Each
iteration produces a candidate revision; the formula returns one of:

  - `ACCEPT_REVISION` — revision passed every gate; loop continues
    with the new candidate.
  - `SPLIT_INTO_SIBLING` — revision could not shrink and must instead
    factor a chunk into a sibling artifact; loop continues with the
    factored pair.
  - `TERMINATE_CONVERGED` — both create-artifact and critical-review
    agents returned APPROVING; loop ends with the current candidate.
  - `TERMINATE_CAP` — round count or wall-time exceeded; loop ends
    with the BEST candidate seen so far (highest review score).
  - `REJECT_AND_RETRY` — revision broke quality floor (NOT APPROVING)
    or monotone gate (grew without splitting); skill re-runs the
    revision step with the prior candidate.

The calling skill loops on the formula's verdict, not on its own
counter — defense-in-depth against a skill that "forgets" to check.

## The two convergence guarantees

The math:

1. **Mathematical guarantee (SKILLS ONLY)** — per-skill char-count
   strictly decreases each accepted iteration (per `[[as-bb5]]`).
   Char-count is bounded below by 0; therefore any infinite sequence
   of accepted iterations contradicts the monotone-decrease invariant;
   therefore the loop terminates. (Bounded monotone → convergent.)

   **Scope correction (Taylor 2026-06-25):** the shrink-OR-split rule
   applies to SKILL.md artifacts only. Other artifact classes —
   plans, theorems, LaTeX, code, specs — may legitimately grow as
   refinement adds detail, references, or test coverage. Forcing
   shrink on those classes is a category error.

   The shrink-OR-split gate is therefore CONDITIONAL on
   `META_FP_ARTIFACT_TYPE == \"skill\"` (default for backward
   compatibility). For non-skill artifacts the gate is skipped and
   the other gates do the convergence work.

2. **Defense-in-depth (UNIVERSAL)** — cap=10 rounds (per Taylor
   2026-06-25 verdict on as-h7r: \"Let's do cap=10. Then I agree with
   the brief.\") + a 15-minute wall-time gate. These exist as
   belt-and-brace; if the monotone gate is buggy or the artifact
   dodges the gate, the cap still terminates the loop. **These fire
   on every artifact type — they are not artifact-type-conditional.**

The cap is **defense-in-depth on top of** the mathematical guarantee —
NOT a replacement for it. A run that hits cap=10 without converging is
a `TERMINATE_CAP` outcome, which is a SIGNAL that the artifact + gates
need tuning. The mail to the calling skill records cap-hit so the
skill can surface it as a "convergence smell" mark on the artifact.

## Universal vs skills-only criteria summary

| Criterion | Scope | Step |
|---|---|---|
| envelope validation | universal | `envelope-check` |
| wall-time 15-min cap | universal | `wall-time-gate` |
| cap=10 rounds | universal | `cap-check` |
| mutual APPROVING converged | universal | `converged-check` |
| shrink-OR-split (mathematical) | **SKILLS ONLY** | `shrink-or-split-gate` |
| APPROVING quality floor | universal | `quality-floor-gate` |
| HAND-OFF / verdict-emit | universal | `verdict-emit` |

The shrink-OR-split gate skips itself (no-op) when
`META_FP_ARTIFACT_TYPE != \"skill\"`. Quality floor still fires; a
non-skill artifact converges via APPROVING + APPROVING (converged
step) and cap=10 + wall-time (defense-in-depth).

## Contract (per iteration)

  IN (env vars):
    - `META_FP_ARTIFACT_PATH`  — absolute path to artifact under FP,
                                  or the literal `text-block`.
    - `META_FP_ARTIFACT_TYPE`  — one of `skill` | `plan` | `theorem`
                                  | `latex` | `code` | `spec` | other.
                                  Default `skill` (back-compat).
                                  Controls shrink-OR-split scope.
    - `META_FP_ITERATION`      — integer ≥ 1 (this iteration).
    - `META_FP_PREV_CHARS`     — char-count of artifact at end of
                                  previous iteration (or initial size
                                  for iteration 1).
    - `META_FP_NEW_CHARS`      — char-count of candidate revision.
    - `META_FP_SPLIT_PRESENT`  — "true" iff candidate also produced a
                                  sibling artifact (split path).
    - `META_FP_REVIEW_VERDICT` — "APPROVING" | "NEEDS-REVISION" from
                                  critical-review subagent.
    - `META_FP_CREATE_VERDICT` — "APPROVING" | "NEEDS-REVISION" from
                                  create-artifact / revise-artifact
                                  subagent.
    - `META_FP_WALL_START`     — ISO-8601 timestamp of iteration 1
                                  start (e.g., `2026-06-25T20:00:00Z`).

  OUT (stdout JSON-line):
    {"verdict":"ACCEPT_REVISION|SPLIT_INTO_SIBLING|TERMINATE_CONVERGED|TERMINATE_CAP|REJECT_AND_RETRY",
     "reason":"<text>",
     "iteration":<int>,
     "chars_delta":<int|null>,
     "wall_elapsed_s":<int>,
     "cap_hit":<bool>,
     "artifact_type":"<type>",
     "formula_version":"1"}

Single-pass per fire (per
`[[dispatcher-policy-no-infinite-loop]]`). The calling skill owns the
loop; this formula owns the per-iteration decision.

## Execution model

Each step description is a self-contained bash block. The calling
skill (currently `coordinate-review`) runs the bash blocks in
declaration order; the first block to emit a JSON verdict to stdout
terminates the iteration. A block that does not emit a verdict returns
exit code 0 and execution proceeds to the next step. A `verdict-emit`
step at the end always emits (it is the default ACCEPT path).

Steps use only POSIX shell + `date` + `printf` so any
`/bin/sh`-capable environment can run them.

## Composition

- `[[catch-no-brainer]]` — the FP-converged artifact may itself
  become a brief that the no-brainer classifier later sees; nothing
  to do here.
- `as-4i8` no-brainer-cycle (sibling formula in this pack) — both
  are codification-class formulas for the brief-pipeline ecosystem;
  shape n=3 of
  `[[gascity-orders-and-formulas-decomposition-pattern]]`.
- `gate-sweep` (core pack) — the formula's gate violations stamp
  short-lived gates the skill polls; gate-sweep reaps stale entries.
- `as-bb5` — the mathematical source of the monotone-shrink
  guarantee. Lifts as-bb5's `fp-finder-skill` SKILL.md rule into a
  reusable framework formula.
- `coordinate-review` SKILL.md (agent-skills) — first consumer; it
  drives the loop and calls this formula per iteration, passing
  `META_FP_ARTIFACT_TYPE` derived from the input artifact.

## Cross-references

- `[[as-bb5]]` — shrink-OR-split rule source (CLOSED).
- `as-h7r` — merged brief; Taylor verdict B+D+F + cap=10 (MERGED).
- `as-2h0` — Phase 1 scaffold parent impl bead (MERGED via as-gz0n).
- `as-2bgd` — Phase 8d runnable + scope-correction (this).
- `as-gz0n` — SAFETY OVERRIDE gate for the v2 SKILL.md install
  (Part 1 of as-2h0; CLOSED 2026-06-25).
- `as-4i8` — sibling formula in this pack (no-brainer-cycle).
- `[[gascity-orders-and-formulas-decomposition-pattern]]` — n=3.
- `[[gate-keep-architecture]]` trinity — X-gate = the two gate
  formulas in this pack; X-policy = the constants in `[vars]`;
  improve-X = the calling skill's revision loop.
- `[[never-echo-credentials]]` — the stdout JSON-line never echoes
  artifact contents, only metadata (path, char count, verdict).
"""
formula = "meta-fp-cycle"
version = 1

[requires]
formula_compiler = ">=2.0.0"

[vars]
[vars.binding_prefix]
description = "Import binding prefix when ops/ is consumed via another pack's [imports.ops]."
default = ""

[vars.round_cap]
description = "Defense-in-depth cap on iterations. Per Taylor 2026-06-25 verdict on as-h7r: cap=10. UNIVERSAL across artifact types."
default = 10

[vars.wall_time_max_s]
description = "Defense-in-depth wall-clock cap per FP loop in seconds. Default 900s (15min) per as-h7r §criterion-3. UNIVERSAL across artifact types."
default = 900

[[steps]]
id = "envelope-check"
title = "Validate iteration envelope (args present + sane)"
description = """
Validate every required env var is set and well-formed. Universal —
fires on every artifact type. Emits `REJECT_AND_RETRY` on malformed
input so the calling skill can rebuild the env and re-invoke. Envelope
failure is NOT termination — the skill may have botched its args.

```bash
emit() {
  printf '%s\\n' "$1"
  exit 0
}

# Default META_FP_ARTIFACT_TYPE to "skill" for back-compat.
META_FP_ARTIFACT_TYPE="${META_FP_ARTIFACT_TYPE:-skill}"
export META_FP_ARTIFACT_TYPE

for v in META_FP_ARTIFACT_PATH META_FP_ITERATION META_FP_PREV_CHARS \\
         META_FP_NEW_CHARS META_FP_SPLIT_PRESENT \\
         META_FP_REVIEW_VERDICT META_FP_CREATE_VERDICT \\
         META_FP_WALL_START; do
  eval "val=\\$$v"
  if [ -z "$val" ]; then
    emit '{"verdict":"REJECT_AND_RETRY","reason":"envelope: '"$v"' is empty or unset","formula_version":"1"}'
  fi
done

case "$META_FP_ITERATION" in
  ''|*[!0-9]*)
    emit '{"verdict":"REJECT_AND_RETRY","reason":"envelope: META_FP_ITERATION must be a positive integer","formula_version":"1"}' ;;
esac
[ "$META_FP_ITERATION" -ge 1 ] || \\
  emit '{"verdict":"REJECT_AND_RETRY","reason":"envelope: META_FP_ITERATION must be >= 1","formula_version":"1"}'

case "$META_FP_PREV_CHARS" in
  ''|*[!0-9]*)
    emit '{"verdict":"REJECT_AND_RETRY","reason":"envelope: META_FP_PREV_CHARS must be a non-negative integer","formula_version":"1"}' ;;
esac
case "$META_FP_NEW_CHARS" in
  ''|*[!0-9]*)
    emit '{"verdict":"REJECT_AND_RETRY","reason":"envelope: META_FP_NEW_CHARS must be a non-negative integer","formula_version":"1"}' ;;
esac

case "$META_FP_REVIEW_VERDICT" in
  APPROVING|NEEDS-REVISION) ;;
  *)
    emit '{"verdict":"REJECT_AND_RETRY","reason":"envelope: META_FP_REVIEW_VERDICT must be APPROVING or NEEDS-REVISION","formula_version":"1"}' ;;
esac
case "$META_FP_CREATE_VERDICT" in
  APPROVING|NEEDS-REVISION) ;;
  *)
    emit '{"verdict":"REJECT_AND_RETRY","reason":"envelope: META_FP_CREATE_VERDICT must be APPROVING or NEEDS-REVISION","formula_version":"1"}' ;;
esac

case "$META_FP_SPLIT_PRESENT" in
  true|false) ;;
  *)
    emit '{"verdict":"REJECT_AND_RETRY","reason":"envelope: META_FP_SPLIT_PRESENT must be true or false","formula_version":"1"}' ;;
esac
```
"""

[[steps]]
id = "wall-time-gate"
title = "Defense-in-depth: terminate if wall-time exceeded (UNIVERSAL)"
needs = ["envelope-check"]
description = """
Universal — fires on every artifact type. Computes elapsed seconds
since `META_FP_WALL_START`; if > `{{wall_time_max_s}}` (default 900s
= 15 min), emit `TERMINATE_CAP`. The cap is for safety; the math gate
guarantees termination for skills. A wall-time hit signals the
artifact + gates need tuning, not a normal exit.

```bash
emit() {
  printf '%s\\n' "$1"
  exit 0
}

# Parse the ISO-8601 start time. macOS `date` and GNU `date` differ;
# try GNU form first, fall back to BSD.
start_epoch=$(date -u -d "$META_FP_WALL_START" +%s 2>/dev/null) || \\
  start_epoch=$(date -u -j -f "%Y-%m-%dT%H:%M:%SZ" "$META_FP_WALL_START" +%s 2>/dev/null) || {
  emit '{"verdict":"REJECT_AND_RETRY","reason":"wall-time: could not parse META_FP_WALL_START as ISO-8601","formula_version":"1"}'
}
now_epoch=$(date -u +%s)
elapsed=$(( now_epoch - start_epoch ))

if [ "$elapsed" -gt {{wall_time_max_s}} ]; then
  emit '{"verdict":"TERMINATE_CAP","reason":"wall_time exceeded '"$elapsed"'s > {{wall_time_max_s}}s","iteration":'"$META_FP_ITERATION"',"wall_elapsed_s":'"$elapsed"',"cap_hit":true,"artifact_type":"'"$META_FP_ARTIFACT_TYPE"'","formula_version":"1"}'
fi

export META_FP_WALL_ELAPSED_S="$elapsed"
```
"""

[[steps]]
id = "cap-check"
title = "Defense-in-depth: terminate if iteration count exceeds cap (UNIVERSAL)"
needs = ["wall-time-gate"]
description = """
Universal — fires on every artifact type. Per Taylor 2026-06-25
verdict on as-h7r: cap=10. Defense-in-depth on top of the mathematical
convergence guarantee (which is itself skills-only). A cap-hit means
the gates failed to converge in 10 rounds; record the smell on the
artifact and hand off to the user (criterion 4).

```bash
emit() {
  printf '%s\\n' "$1"
  exit 0
}

if [ "$META_FP_ITERATION" -gt {{round_cap}} ]; then
  emit '{"verdict":"TERMINATE_CAP","reason":"iteration '"$META_FP_ITERATION"' > cap {{round_cap}}","iteration":'"$META_FP_ITERATION"',"wall_elapsed_s":'"${META_FP_WALL_ELAPSED_S:-0}"',"cap_hit":true,"artifact_type":"'"$META_FP_ARTIFACT_TYPE"'","formula_version":"1"}'
fi
```
"""

[[steps]]
id = "converged-check"
title = "Mutual APPROVING → TERMINATE_CONVERGED (UNIVERSAL)"
needs = ["cap-check"]
description = """
Universal — fires on every artifact type. Mutual APPROVING is the
formal stop condition: both the creator and the reviewer agree the
artifact is good. The loop terminates with this candidate as the
final answer.

```bash
emit() {
  printf '%s\\n' "$1"
  exit 0
}

delta=$(( META_FP_NEW_CHARS - META_FP_PREV_CHARS ))

if [ "$META_FP_CREATE_VERDICT" = "APPROVING" ] && \\
   [ "$META_FP_REVIEW_VERDICT" = "APPROVING" ]; then
  emit '{"verdict":"TERMINATE_CONVERGED","reason":"create + review both APPROVING","iteration":'"$META_FP_ITERATION"',"chars_delta":'"$delta"',"wall_elapsed_s":'"${META_FP_WALL_ELAPSED_S:-0}"',"cap_hit":false,"artifact_type":"'"$META_FP_ARTIFACT_TYPE"'","formula_version":"1"}'
fi

export META_FP_CHARS_DELTA="$delta"
```
"""

[[steps]]
id = "shrink-or-split-gate"
title = "Mathematical guarantee: monotone shrink OR factor-out split (SKILLS ONLY)"
needs = ["converged-check"]
description = """
**SKILLS-ONLY gate.** Fires only when
`META_FP_ARTIFACT_TYPE == \"skill\"`. The shrink-OR-split rule is the
mathematical convergence guarantee for the skill-tightening case (per
`[[as-bb5]]`).

For non-skill artifacts (plans, theorems, LaTeX, code, specs) this
gate is skipped — those classes may grow legitimately as refinement
adds detail. Termination for non-skills comes from the universal gates
(converged-check + cap=10 + wall-time).

Per Taylor 2026-06-25 scope clarification: shrink-OR-split is SKILLS
ONLY. Other 5 META-FP criteria remain UNIVERSAL.

Gate logic for skills:

  1. Strict shrink (`NEW < PREV`) → continue to quality-floor.
  2. Split present (`META_FP_SPLIT_PRESENT == true`) → continue;
     the candidate did not shrink but produced a sibling artifact.
     Future iterations rebaseline against the new size.
  3. Else → emit `REJECT_AND_RETRY`. Skill restores the prior
     candidate and re-runs the revisor with an extra OBSERVED note.

```bash
emit() {
  printf '%s\\n' "$1"
  exit 0
}

if [ "$META_FP_ARTIFACT_TYPE" != "skill" ]; then
  # Non-skill artifact: gate is a no-op. Continue to quality-floor.
  exit 0
fi

if [ "$META_FP_NEW_CHARS" -lt "$META_FP_PREV_CHARS" ]; then
  # Path A — strict shrink. Continue.
  exit 0
fi

if [ "$META_FP_SPLIT_PRESENT" = "true" ]; then
  # Path B — split into sibling. Continue.
  exit 0
fi

# Gate FAIL — grew without splitting.
delta="${META_FP_CHARS_DELTA:-0}"
emit '{"verdict":"REJECT_AND_RETRY","reason":"shrink-or-split: new ('"$META_FP_NEW_CHARS"') >= prev ('"$META_FP_PREV_CHARS"') without split (artifact_type=skill)","iteration":'"$META_FP_ITERATION"',"chars_delta":'"$delta"',"wall_elapsed_s":'"${META_FP_WALL_ELAPSED_S:-0}"',"cap_hit":false,"artifact_type":"'"$META_FP_ARTIFACT_TYPE"'","formula_version":"1"}'
```
"""

[[steps]]
id = "quality-floor-gate"
title = "Quality floor: revision wins ONLY if APPROVING per critical-review (UNIVERSAL)"
needs = ["shrink-or-split-gate"]
description = """
Universal — fires on every artifact type. Per as-bb5 §Quality floor:
\"A revision wins the gate only if it is shorter AND still APPROVING
per critical-review. Prevents trivial-deletion gaming.\" Without this
gate, a creator could pass the shrink check by deleting random
content.

For non-skill artifacts the shrink half is N/A, but the APPROVING
half still fires — quality floor is universal.

```bash
emit() {
  printf '%s\\n' "$1"
  exit 0
}

if [ "$META_FP_REVIEW_VERDICT" != "APPROVING" ]; then
  delta="${META_FP_CHARS_DELTA:-0}"
  emit '{"verdict":"REJECT_AND_RETRY","reason":"quality_floor: critical-review verdict '"$META_FP_REVIEW_VERDICT"' != APPROVING","iteration":'"$META_FP_ITERATION"',"chars_delta":'"$delta"',"wall_elapsed_s":'"${META_FP_WALL_ELAPSED_S:-0}"',"cap_hit":false,"artifact_type":"'"$META_FP_ARTIFACT_TYPE"'","formula_version":"1"}'
fi
```
"""

[[steps]]
id = "verdict-emit"
title = "Emit ACCEPT_REVISION or SPLIT_INTO_SIBLING verdict (UNIVERSAL)"
needs = ["quality-floor-gate"]
description = """
Universal — fires on every artifact type. This is the default-accept
path; reached only when all preceding gates passed. The skill consumes
the verdict, updates its loop state (artifact + char-count), and
either continues or terminates per the verdict string.

```bash
emit() {
  printf '%s\\n' "$1"
  exit 0
}

delta="${META_FP_CHARS_DELTA:-0}"
elapsed="${META_FP_WALL_ELAPSED_S:-0}"

if [ "$META_FP_SPLIT_PRESENT" = "true" ]; then
  emit '{"verdict":"SPLIT_INTO_SIBLING","reason":"accepted: split into sibling artifact","iteration":'"$META_FP_ITERATION"',"chars_delta":'"$delta"',"wall_elapsed_s":'"$elapsed"',"cap_hit":false,"artifact_type":"'"$META_FP_ARTIFACT_TYPE"'","formula_version":"1"}'
fi

emit '{"verdict":"ACCEPT_REVISION","reason":"accepted: passed all gates","iteration":'"$META_FP_ITERATION"',"chars_delta":'"$delta"',"wall_elapsed_s":'"$elapsed"',"cap_hit":false,"artifact_type":"'"$META_FP_ARTIFACT_TYPE"'","formula_version":"1"}'
```
"""
