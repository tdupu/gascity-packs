# Custom-pattern rules for the `never-echo-credentials-lint` gate.
#
# **STATUS: Phase 1 scaffold.** Pattern rules + allowlist captured as
# normative TOML; the gate's Phase 2 implementation reads this file
# (resolved as `{{pack_assets_dir}}/never-echo-credentials-patterns.toml`)
# and runs the patterns + allowlist against the artifact text. The TOML
# parses clean against `tomllib` so `gc lint` is happy at the pack
# layer; the runtime that consumes the rules is the gate's `check` step
# in `ops/formulas/gates/never-echo-credentials-lint.toml`.
#
# Format mirrors gitleaks' own TOML ruleset shape (gitleaks v8.x) so
# the patterns and allowlist can be merged into a single
# `gitleaks detect --config` invocation if needed — no separate parser
# required at the gate runtime. Each `[[rules]]` block is a gitleaks
# rule; each `[[allowlists]]` block is a gitleaks allowlist.
#
# Composes with the repo's `.gitleaksignore` (per `[[as-jnf]]`
# precedent) and with the existing pre-push gitleaks hook
# (per `[[as-zjbb]]` / `[[as-du4u]]` narrowing).
#
# Cross-references:
#   `[[never-echo-credentials]]` — source memory.
#   `[[as-jnf]]` — `.gitleaksignore` precedent and allowlist shape.
#   `[[as-zjbb]]` / `[[as-du4u]]` — pre-push gitleaks hook scope.
#   `ops/formulas/gates/never-echo-credentials-lint.toml` — the gate
#       that loads these rules at runtime.

# ---------------------------------------------------------------------
# Pattern rules — HIGH-SIGNAL credential shapes.
#
# Each rule has:
#   id          — stable identifier; gate's REDACTED output references
#                  this in the `rule=<id>` field.
#   description — short human label.
#   regex       — Go RE2 (gitleaks' regex flavor).
#   tags        — optional context tags (used by the parent formula to
#                  pick consequence policy).
# ---------------------------------------------------------------------

[[rules]]
id = "github-pat-classic"
description = "GitHub personal access token (classic prefix)"
regex = '''ghp_[0-9A-Za-z]{36}'''
tags = ["github", "token", "high-confidence"]

[[rules]]
id = "github-pat-server"
description = "GitHub server-to-server token"
regex = '''ghs_[0-9A-Za-z]{36}'''
tags = ["github", "token", "high-confidence"]

[[rules]]
id = "github-pat-oauth"
description = "GitHub OAuth access token"
regex = '''gho_[0-9A-Za-z]{36}'''
tags = ["github", "token", "high-confidence"]

[[rules]]
id = "github-pat-user"
description = "GitHub user-to-server token"
regex = '''ghu_[0-9A-Za-z]{36}'''
tags = ["github", "token", "high-confidence"]

[[rules]]
id = "github-pat-refresh"
description = "GitHub refresh token"
regex = '''ghr_[0-9A-Za-z]{36}'''
tags = ["github", "token", "high-confidence"]

[[rules]]
id = "aws-access-key"
description = "AWS access key ID"
regex = '''AKIA[0-9A-Z]{16}'''
tags = ["aws", "key", "high-confidence"]

[[rules]]
id = "aws-temp-access-key"
description = "AWS temporary access key ID (STS)"
regex = '''ASIA[0-9A-Z]{16}'''
tags = ["aws", "key", "high-confidence"]

[[rules]]
id = "private-key-block"
description = "PEM private key block header"
regex = '''-----BEGIN [A-Z ]*PRIVATE KEY-----'''
tags = ["private-key", "high-confidence"]

[[rules]]
id = "slack-bot-token"
description = "Slack bot token (xoxb-…)"
regex = '''xoxb-[0-9]+-[0-9]+-[A-Za-z0-9]{24,}'''
tags = ["slack", "token", "high-confidence"]

[[rules]]
id = "slack-user-token"
description = "Slack user token (xoxp-…)"
regex = '''xoxp-[0-9]+-[0-9]+-[0-9]+-[A-Za-z0-9]{32,}'''
tags = ["slack", "token", "high-confidence"]

# Generic API-key shape near `key=` / `token=` / `secret=` lines.
# Lower confidence; meant to flag for self-review, not auto-block.
# Parent formula MAY treat `borderline` tag as WARN-not-BLOCK.
[[rules]]
id = "generic-api-key-assignment"
description = "Generic high-entropy assignment near key/token/secret"
regex = '''(?i)(api[_-]?key|secret|token|password)\s*[:=]\s*['"]?[A-Za-z0-9+/=_-]{20,}['"]?'''
tags = ["generic", "borderline"]

# ---------------------------------------------------------------------
# Allowlist — documentation placeholders (per `[[as-jnf]]` precedent).
#
# Allowlist entries follow the same fingerprint shape as
# `.gitleaksignore` so the two layers stay consistent. A match
# suppresses the corresponding rule for that specific string.
# ---------------------------------------------------------------------

[[allowlists]]
description = "Slack xoxb-YOUR-TOKEN placeholder (SETUP.md curl examples)"
regexes = ['''xoxb-YOUR-TOKEN''']

[[allowlists]]
description = "GitHub PAT placeholder (documentation examples)"
regexes = ['''ghp_YOUR_TOKEN_HERE''']

[[allowlists]]
description = "JSON-schema example private-key shape (github-intake.github-app-identity.v1)"
regexes = ['''-----BEGIN PRIVATE KEY-----\\n\.\.\.\\n-----END PRIVATE KEY-----\\n''']

[[allowlists]]
description = "RFC 6455 canonical WebSocket sample handshake nonce (Discord gateway test)"
regexes = ['''dGhlIHNhbXBsZSBub25jZQ==''']

# Markers that opt a literal out of scanning — comment `#
# rfc-canonical-example` / `# placeholder` adjacent to the literal
# signals documentation intent. The gate scans for these markers
# within +/- 3 lines of a match before flagging.
[[allowlists]]
description = "Self-documenting placeholder markers (adjacent comment lines)"
regexes = [
  '''#\s*rfc-canonical-example''',
  '''#\s*placeholder''',
  '''#\s*example-only''',
  '''#\s*gitleaks:allow''',
]

# ---------------------------------------------------------------------
# Context exclusions — paths/fixtures that are inherently placeholder-
# heavy (test fixtures, examples, vendored docs). The gate skips
# patterns inside these prefixes UNLESS the
# `force_scan_fixtures = true` option is passed by the parent formula.
# ---------------------------------------------------------------------

[exclusions]
paths = [
  "**/fixtures/**",
  "**/testdata/**",
  "**/*_test.go",
  "**/*.test.ts",
  "**/example/**",
  "**/examples/**",
  "**/docs/**/*.md",
]
