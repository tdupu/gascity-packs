[order]
description = "Promote or reject one brief whenever the pile has pending markdown briefs"
scope = "city"
formula = "brief-shuffle"
trigger = "condition"
check = "find .beads/briefs/.pile -mindepth 1 -maxdepth 1 -type f -name '*.md' 2>/dev/null | grep -q ."
pool = "dog"
timeout = "60s"
idempotent = true

