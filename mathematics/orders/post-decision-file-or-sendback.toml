# Event-trigger order — the post-decision bell-catcher.
#
# `brief.decided` is rung by brief-record-decision (emit-decided-event
# step) whenever a brief decision is recorded, and by the refinery after
# merge-time decisions once the refinery-role expansion lands (gsp-itx).
# This order catches the bell and pours the file-or-sendback gate, which
# appends the FILE/SEND-BACK audit log (decisions/file-or-sendback.jsonl)
# and fires downstream brief-prep or archive-sweep.
#
# Event-driven per Taylor 2026-06-30: ring the bell — no polling, no
# cron, no interval recheck. The formula is idempotent (it scans durable
# decision records and skips already-routed slugs), so coalesced or
# repeated events are safe.

[order]
description = "Route a decided brief: log FILE/SEND-BACK and fire downstream work"
scope = "city"
formula = "file-or-sendback-route"
trigger = "event"
on = "brief.decided"
pool = "polecat"
timeout = "120s"
idempotent = true
