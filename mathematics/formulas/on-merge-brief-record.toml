description = """
Post-merge brief-record duty: inspect the most-recently closed bead and,
if it carries the `needs-decision` label, create a brief-record bead and
touch the brief-prep pipeline.

Fired by the `on-merge-brief-record` order (event trigger on `bead.closed`).

## Decision logic (verbatim per task-2-brief §2)

After a successful merge of bead X:
  (a) X is already closed by the refinery (existing behavior — no action).
  (b) IF X carries the `needs-decision` label:
      - Create a brief-record bead titled `[brief-record] <X-id> <X-title>`
        with `metadata.source_bead = X-id`.
      - Touch the brief-prep pipeline by creating a brief-prep work bead
        using the brief-prep formula's intake convention:
          source  = X-id   (the just-closed bead)
          brief_slug = `brief-<X-id>` (stable slug derived from source bead)
          brief_type = "decision"
  (c) IF X is unlabeled (no `needs-decision`): do nothing extra.

## Agent instructions

This formula is a WAKE-UP, not a single-bead handler. The `bead.closed` event
is only a signal that some bead closed; the controller passes no event-derived
bead id to the formula (any trigger-bead env var, when set, points at the
formula's OWN work bead, not the closed bead that fired the event). So we do a
durable-state scan: list recently closed `needs-decision` beads and create
brief-records for the ones that don't have one yet. This coalesces naturally —
many closes, one wake, no duplicates.

**Step 0 — scan recently closed needs-decision beads**

```bash
# Recently closed beads carrying the needs-decision label.
SINCE="$(date -u -v-7d '+%Y-%m-%d' 2>/dev/null || date -u -d '7 days ago' '+%Y-%m-%d' 2>/dev/null || echo '1970-01-01')"
CLOSED_IDS=$(bd list --status closed --label needs-decision \\
  --closed-after "$SINCE" --json 2>/dev/null | jq -r '.[].id // empty')
```

**Step 1 — skip beads that already have a brief-record**

For each closed id, a brief-record bead already exists iff a bead titled
`[brief-record] <id> ...` is present:
```bash
has_record() {
  bd list --all --title "[brief-record] $1 " --json 2>/dev/null \\
    | jq -e 'length > 0' >/dev/null 2>&1
}
```

**Step 2 — create brief-record beads for the missing ones**

```bash
for CLOSED_ID in $CLOSED_IDS; do
  has_record "$CLOSED_ID" && continue
  TITLE=$(bd show "$CLOSED_ID" --json | jq -r '.[0].title // ""')
  bd create \\
    --type=task \\
    --title="[brief-record] $CLOSED_ID $TITLE" \\
    --metadata "$(jq -n --arg sb "$CLOSED_ID" '{source_bead: $sb}')" \\
    --json
done
```

**Step 3 — touch the brief-prep pipeline (per missing bead)**

Primary idiom is `bd mol pour` (persistent work with an audit trail):
```bash
SLUG="brief-${CLOSED_ID}"
bd mol pour brief-prep \\
  --var source="$CLOSED_ID" \\
  --var brief_slug="$SLUG" \\
  --var brief_type="decision"
```

If `bd mol pour brief-prep` is unavailable, create the intake work bead
directly:
```bash
bd create \\
  --type=task \\
  --title="[brief-prep] $SLUG" \\
  --metadata "$(jq -n --arg s "$CLOSED_ID" --arg sl "$SLUG" \\
    '{"gc.brief.source": $s, "gc.brief.slug": $sl, "gc.brief.type": "decision"}')"
```
"""
formula = "on-merge-brief-record"
version = 1

[requires]
formula_compiler = ">=2.0.0"

[catalog]
name = "on-merge-brief-record"
description = "Post-merge hook: create a brief-record and enter brief-prep when a closed bead carries needs-decision."

[vars]
[vars.prep_target]
description = "Run target for brief-prep bookkeeping steps."
default = "gc.run-operator"

[vars.artifact_root]
description = "Brief pipeline artifact root relative to the city or rig root."
default = ".beads/briefs"

[[steps]]
id = "identify-closed-bead"
title = "Scan recently closed needs-decision beads"
metadata = { "gc.run_target" = "{{prep_target}}" }
description = """
This step is a durable-state SCAN, not a single-bead lookup. The bead.closed
event carries no usable bead id into the formula (any trigger-bead env var
points at the formula's own work bead, and there is no per-cursor events query
to recover the closed subject), so list the recently closed beads that carry
the `needs-decision` label. Processing the
full recent set — not just "the one that fired" — is what coalesces multiple
closes behind one wake without duplicating brief-records.

```bash
SINCE="$(date -u -v-7d '+%Y-%m-%d' 2>/dev/null || date -u -d '7 days ago' '+%Y-%m-%d' 2>/dev/null || echo '1970-01-01')"
CLOSED_IDS=$(bd list --status closed --label needs-decision \\
  --closed-after "$SINCE" --json 2>/dev/null | jq -r '.[].id // empty')
if [ -z "$CLOSED_IDS" ]; then
  echo "no recently closed needs-decision beads; nothing to do"
  exit 0
fi
echo "CLOSED_IDS=$CLOSED_IDS"
```

Record CLOSED_IDS for downstream steps.
"""

[[steps]]
id = "check-needs-decision-label"
title = "Check for needs-decision label"
needs = ["identify-closed-bead"]
metadata = { "gc.run_target" = "{{prep_target}}" }
description = """
The scan already filtered on the `needs-decision` label, so every id in
CLOSED_IDS qualifies (task-2-brief §2(b/c) — unlabeled beads are excluded by
construction). This step deduplicates: skip any closed bead that already has a
`[brief-record] <id> ...` bead, so repeated wakes never create duplicates.

```bash
has_record() {
  # A brief-record already exists iff a bead titled "[brief-record] <id> " is present.
  bd list --all --title "[brief-record] $1 " --json 2>/dev/null \\
    | jq -e 'length > 0' >/dev/null 2>&1
}

MISSING=""
for CLOSED_ID in $CLOSED_IDS; do
  if has_record "$CLOSED_ID"; then
    echo "brief-record already exists for $CLOSED_ID; skipping"
    continue
  fi
  MISSING="$MISSING $CLOSED_ID"
done
if [ -z "$(echo "$MISSING" | tr -d ' ')" ]; then
  echo "all closed needs-decision beads already have brief-records; nothing to do"
  exit 0
fi
echo "MISSING=$MISSING"
```
"""

[[steps]]
id = "create-brief-record-bead"
title = "Create brief-record bead"
needs = ["check-needs-decision-label"]
metadata = { "gc.run_target" = "{{prep_target}}" }
description = """
For each id in MISSING, create a brief-record bead titled
`[brief-record] <CLOSED_ID> <short-title>` with metadata linking back to the
source bead (task-2-brief §2(b)). `bd create` takes metadata as a single JSON
blob via `--metadata` (there is no repeatable `--set-metadata` on `bd create`).

```bash
for CLOSED_ID in $MISSING; do
  BEAD_TITLE=$(bd show "$CLOSED_ID" --json | jq -r '.[0].title // ""')
  BRIEF_RECORD=$(bd create \\
    --type=task \\
    --title="[brief-record] $CLOSED_ID $BEAD_TITLE" \\
    --metadata "$(jq -n --arg sb "$CLOSED_ID" '{source_bead: $sb}')" \\
    --json | jq -r '.id')
  if [ -z "$BRIEF_RECORD" ]; then
    echo "ERROR: failed to create brief-record bead for $CLOSED_ID"
    exit 1
  fi
  echo "brief-record bead created: $BRIEF_RECORD (source_bead: $CLOSED_ID)"
done
```
"""

[[steps]]
id = "touch-brief-prep-pipeline"
title = "Touch the brief-prep pipeline"
needs = ["create-brief-record-bead"]
metadata = { "gc.run_target" = "{{prep_target}}", "gc.brief.type" = "decision" }
description = """
Enter the brief-prep pipeline for each MISSING closed bead per the brief-prep
formula's intake convention (source, brief_slug, brief_type) — task-2-brief
§2(b). The slug is derived from the source bead id for stability:
`brief-<CLOSED_ID>`.

Primary idiom — `bd mol pour` (persistent work with an audit trail):
```bash
for CLOSED_ID in $MISSING; do
  SLUG="brief-${CLOSED_ID}"
  if bd mol pour brief-prep \\
      --var source="$CLOSED_ID" \\
      --var brief_slug="$SLUG" \\
      --var brief_type="decision"; then
    echo "poured brief-prep for $SLUG"
    continue
  fi
  # Fallback — create the intake work bead directly (agent picks it up via the
  # brief-watchdog-refill order cycle). bd create takes metadata as one JSON blob.
  bd create \\
    --type=task \\
    --title="[brief-prep] $SLUG" \\
    --metadata "$(jq -n --arg s "$CLOSED_ID" --arg sl "$SLUG" --arg p "{{artifact_root}}/.staging/$SLUG/brief.md" \\
      '{"gc.brief.source": $s, "gc.brief.slug": $sl, "gc.brief.type": "decision", "gc.brief.path": $p}')"
  echo "brief-prep work bead created for slug $SLUG"
done
```
"""
