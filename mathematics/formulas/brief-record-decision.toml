description = """
Record Taylor's decision for a presented brief and archive the run.
"""
formula = "brief-record-decision"
version = 1

[requires]
formula_compiler = ">=2.0.0"

[catalog]
name = "brief-record-decision"
description = "Write a canonical decision record and archive brief artifacts."

[vars]
[vars.brief_slug]
description = "Slug of the stack brief being decided."
required = true
pattern = "^[A-Za-z0-9._-]+$"

[vars.decision]
description = "Taylor's decision."
required = true
enum = ["approve", "reject", "revise", "defer"]

[vars.reason]
description = "Short reason or decision note."
default = ""

[vars.artifact_root]
description = "Brief pipeline artifact root."
default = ".beads/briefs"

[vars.operator_target]
description = "Run target for decision bookkeeping."
default = "gc.run-operator"

[[steps]]
id = "write-decision"
title = "Write the decision record"
metadata = { "gc.run_target" = "{{operator_target}}", "gc.brief.slug" = "{{brief_slug}}", "gc.brief.decision" = "{{decision}}", "gc.brief.decision_path" = "{{artifact_root}}/decisions/{{brief_slug}}.toml" }
description = """
Write `{{artifact_root}}/decisions/{{brief_slug}}.toml` with:

- brief slug
- decision: `{{decision}}`
- reason: `{{reason}}`
- decision maker: Taylor
- timestamp
- stack path
- artifact paths

Use `record-decision` from the brief bundle for the durable decision shape.
"""

[steps.check]
max_attempts = 2

[steps.check.check]
mode = "exec"
path = "/Users/tdupuy/gt/gascity-packs/mathematics/assets/scripts/checks/brief-decision-record-required.sh"
timeout = "1m"

[[steps]]
id = "archive-brief"
title = "Archive the brief and staged artifacts"
needs = ["write-decision"]
metadata = { "gc.run_target" = "{{operator_target}}", "gc.brief.slug" = "{{brief_slug}}", "gc.brief.root" = "{{artifact_root}}" }
description = """
Move the decided brief and its staging directory under
`{{artifact_root}}/archive/{{brief_slug}}/`. Keep the decision record in
`{{artifact_root}}/decisions/` as the indexable canonical record.
"""

[[steps]]
id = "update-manifest"
title = "Update manifest decision state"
needs = ["archive-brief"]
metadata = { "gc.run_target" = "{{operator_target}}", "gc.brief.slug" = "{{brief_slug}}", "gc.brief.root" = "{{artifact_root}}" }
description = """
Mark the manifest entry for `{{brief_slug}}` as decided or archived without
removing historical stack information. The manifest must remain valid JSONL.
"""

[steps.check]
max_attempts = 1

[steps.check.check]
mode = "exec"
path = "/Users/tdupuy/gt/gascity-packs/mathematics/assets/scripts/checks/brief-manifest-current.sh"
timeout = "1m"

