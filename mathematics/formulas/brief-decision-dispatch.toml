description = """
Brief-decision dispatch: for each undispatched decision record, execute the
routing action dictated by the decision field and mark the record dispatched.

Routing contract (approve=merge back edge — HQ decision gt-r4ou):

  approve  → Set `branch` and `target` metadata on the source bead (default
             branch from GC_DEFAULT_BRANCH or "main"); reassign the bead to
             the owning rig's refinery session so polecat's work moves into
             the merge queue. This is the approval=merge back edge.
  reject   → Create a follow-up bead in the source rig titled
             `[rejected] <brief_slug>` carrying the decision reason; no merge
             action.
  revise   → Create a follow-up bead in the source rig titled
             `[revise] <brief_slug>` carrying the decision reason so the
             author can act on the feedback; no merge action.
  defer    → No-op beyond marking the record dispatched (the brief stays in
             the archive; no follow-up bead created).

Idempotency: dispatching the same decision twice must be a no-op. The check
script (brief-decision-dispatched-check.sh) compares decision TOML slugs
against the dispatched ledger (.beads/briefs/decisions-dispatched.jsonl) and
exits 1 (fail) if the slug is already present, halting the dispatch step
before it can re-act. The scan-undispatched step pre-filters, so a run where
ALL pending decisions are already dispatched completes as a safe no-op.
"""
formula = "brief-decision-dispatch"
version = 1

[requires]
formula_compiler = ">=2.0.0"

[catalog]
name = "brief-decision-dispatch"
description = "Dispatch approve/reject/revise/defer actions from decision records and record dispatch in the ledger."

[vars]
[vars.artifact_root]
description = "Brief pipeline artifact root."
default = ".beads/briefs"

[vars.operator_target]
description = "Run target for deterministic scanning and metadata writes."
default = "gc.run-operator"

[vars.dispatch_target]
description = "Run target for reassignment/bead-creation steps."
default = "gc.run-operator"

[vars.default_branch]
description = "Default merge target branch (approve path). Falls back to GC_DEFAULT_BRANCH env var, then 'main'."
default = "main"

[[steps]]
id = "scan-undispatched"
title = "Scan for undispatched decision records"
metadata = { "gc.run_target" = "{{operator_target}}", "gc.brief.root" = "{{artifact_root}}", "gc.brief.dispatch_ledger" = "{{artifact_root}}/decisions-dispatched.jsonl" }
description = """
Find decision records that have not yet been dispatched.

A record is UNDISPATCHED when `{{artifact_root}}/decisions/<slug>.toml`
exists but no line in `{{artifact_root}}/decisions-dispatched.jsonl` has
`brief_slug` equal to that slug.

Algorithm:

```bash
ROOT="{{artifact_root}}"
LEDGER="$ROOT/decisions-dispatched.jsonl"
mkdir -p "$ROOT/decisions"

pending=""
for f in "$ROOT/decisions/"*.toml; do
  [ -f "$f" ] || continue
  slug="$(basename "$f" .toml)"
  if [ -f "$LEDGER" ] && grep -q "\"$slug\"" "$LEDGER" 2>/dev/null; then
    echo "already dispatched: $slug"
    continue
  fi
  pending="$pending $slug"
  echo "undispatched: $slug"
done

if [ -z "$(echo "$pending" | tr -d ' ')" ]; then
  echo "no undispatched decision records; nothing to do"
  exit 0
fi
echo "PENDING_SLUGS=$pending"
```

Record PENDING_SLUGS for the dispatch step. If nothing is pending, exit
cleanly — this makes the formula safe to fire repeatedly.
"""

[[steps]]
id = "dispatch-decisions"
title = "Execute routing action and append dispatch ledger"
needs = ["scan-undispatched"]
metadata = { "gc.run_target" = "{{dispatch_target}}", "gc.brief.root" = "{{artifact_root}}", "gc.brief.dispatch_ledger" = "{{artifact_root}}/decisions-dispatched.jsonl" }
description = """
For each undispatched slug, read the decision record, execute the routing
action, and append one JSONL line to `{{artifact_root}}/decisions-dispatched.jsonl`.

Process each slug in PENDING_SLUGS:

```bash
ROOT="{{artifact_root}}"
LEDGER="$ROOT/decisions-dispatched.jsonl"
DEFAULT_BRANCH="${GC_DEFAULT_BRANCH:-{{default_branch}}}"

dispatch_slug() {
  slug="$1"
  rec="$ROOT/decisions/$slug.toml"
  [ -f "$rec" ] || { echo "WARN: missing record for $slug"; return; }

  # Idempotency guard: re-check ledger before acting (handles re-entry).
  if [ -f "$LEDGER" ] && grep -q "\"$slug\"" "$LEDGER" 2>/dev/null; then
    echo "already dispatched (re-entry guard): $slug"
    return
  fi

  # Read fields from the TOML record (one key=value per line; values quoted).
  decision="$(grep '^decision[[:space:]]*=' "$rec" | head -n1 | sed 's/.*=[[:space:]]*//' | tr -d '"')"
  reason="$(grep '^reason[[:space:]]*=' "$rec" | head -n1 | sed 's/.*=[[:space:]]*//' | tr -d '"')"
  source_bead="$(grep '^source_bead\b[[:space:]]*=' "$rec" | head -n1 | sed 's/.*=[[:space:]]*//' | tr -d '"')"

  action_taken=""
  follow_up_bead=""

  case "$decision" in
    approve)
      # Approval = merge: set branch + target metadata, reassign to refinery.
      if [ -n "$source_bead" ]; then
        # Set branch to polecat/<source_bead> (the polecat convention).
        branch="polecat/${source_bead}"
        gc bd set-metadata "$source_bead" branch="$branch" 2>/dev/null || true
        gc bd set-metadata "$source_bead" target="$DEFAULT_BRANCH" 2>/dev/null || true
        # Reassign to refinery (the owning rig's refinery pool handles pickup).
        gc bd reassign "$source_bead" --to refinery 2>/dev/null || true
        action_taken="reassigned $source_bead to refinery (branch=$branch target=$DEFAULT_BRANCH)"
      else
        action_taken="approve dispatch skipped: no source_bead in record"
      fi
      ;;
    reject)
      if [ -n "$source_bead" ]; then
        follow_up_bead="$(gc bd create \
          --type=task \
          --title="[rejected] $slug" \
          --set-metadata source_bead="$source_bead" \
          --set-metadata brief_slug="$slug" \
          --set-metadata decision_reason="$reason" \
          --json 2>/dev/null | jq -r '.id // empty' 2>/dev/null)"
        action_taken="created reject follow-up bead: ${follow_up_bead:-FAILED}"
      else
        follow_up_bead="$(gc bd create \
          --type=task \
          --title="[rejected] $slug" \
          --set-metadata brief_slug="$slug" \
          --set-metadata decision_reason="$reason" \
          --json 2>/dev/null | jq -r '.id // empty' 2>/dev/null)"
        action_taken="created reject follow-up bead (no source): ${follow_up_bead:-FAILED}"
      fi
      ;;
    revise)
      if [ -n "$source_bead" ]; then
        follow_up_bead="$(gc bd create \
          --type=task \
          --title="[revise] $slug" \
          --set-metadata source_bead="$source_bead" \
          --set-metadata brief_slug="$slug" \
          --set-metadata decision_reason="$reason" \
          --json 2>/dev/null | jq -r '.id // empty' 2>/dev/null)"
        action_taken="created revise follow-up bead: ${follow_up_bead:-FAILED}"
      else
        follow_up_bead="$(gc bd create \
          --type=task \
          --title="[revise] $slug" \
          --set-metadata brief_slug="$slug" \
          --set-metadata decision_reason="$reason" \
          --json 2>/dev/null | jq -r '.id // empty' 2>/dev/null)"
        action_taken="created revise follow-up bead (no source): ${follow_up_bead:-FAILED}"
      fi
      ;;
    defer)
      action_taken="deferred: no dispatch action"
      ;;
    *)
      action_taken="unknown decision type '$decision'; skipping action"
      ;;
  esac

  echo "dispatched $slug ($decision): $action_taken"

  # Append to dispatch ledger — append-only, never rewrite.
  ts="$(date -u '+%Y-%m-%dT%H:%M:%SZ' 2>/dev/null || echo 'unknown')"
  printf '%s\n' "$(jq -n \
    --arg slug "$slug" \
    --arg decision "$decision" \
    --arg action "$action_taken" \
    --arg follow_up "${follow_up_bead:-}" \
    --arg ts "$ts" \
    --arg source "$source_bead" \
    '{brief_slug: $slug, decision: $decision, source_bead: $source, action: $action, follow_up_bead: $follow_up, dispatched_at: $ts}')" \
    >> "$LEDGER"
}

for slug in $PENDING_SLUGS; do
  dispatch_slug "$slug"
done
```

Append-only; never rewrite existing lines. The ledger is the durable audit
trail for Taylor.
"""

[steps.check]
max_attempts = 2

[steps.check.check]
mode = "exec"
path = "../assets/scripts/checks/brief-decision-dispatched-check.sh"
timeout = "1m"
