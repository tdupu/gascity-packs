description = """
Classify and optionally process no-brainer briefs.

This formula is safe by default. It classifies candidates and records the
result; shortcut execution is blocked unless the local kill switch exists and
all stop gates are clear.
"""
formula = "no-brainer-classify"
version = 1

[requires]
formula_compiler = ">=2.0.0"

[catalog]
name = "no-brainer-classify"
description = "Apply the no-brainer brief filter without bypassing stop gates."

[vars]
[vars.brief_path]
description = "Optional path to a brief. Empty means select the next no-brainer candidate from the pile."
default = ""

[vars.artifact_root]
description = "Brief pipeline artifact root."
default = ".beads/briefs"

[vars.mode]
description = "Classification only or attempt guarded execution."
default = "classify"
enum = ["classify", "guarded-execute"]

[vars.operator_target]
description = "Run target for no-brainer classification."
default = "gc.review-synthesizer"

[[steps]]
id = "load-candidate"
title = "Load no-brainer candidate"
metadata = { "gc.run_target" = "{{operator_target}}", "gc.brief.path" = "{{brief_path}}", "gc.brief.root" = "{{artifact_root}}" }
description = """
Load `{{brief_path}}`. If it is empty, select one candidate brief from
`{{artifact_root}}/.pile` or `{{artifact_root}}/stack` that asks for
no-brainer classification. Do not process more than one candidate in a run.
"""

[[steps]]
id = "enforce-safety-exclusions"
title = "Enforce no-brainer safety exclusions"
needs = ["load-candidate"]
metadata = { "gc.run_target" = "{{operator_target}}", "gc.brief.path" = "{{brief_path}}", "gc.brief.root" = "{{artifact_root}}" }
description = """
Apply server-touching, user-skill-touching, test-execution, LaTeX, and
auto-merge kill-switch exclusions. Any exclusion forces classification to
`not-no-brainer` or `needs-Taylor`.
"""

[steps.check]
max_attempts = 1

[steps.check.check]
mode = "exec"
path = "/Users/tdupuy/repos/gascity-packs/mathematics/assets/scripts/checks/brief-no-brainer-execute-safety.sh"
timeout = "1m"

[[steps]]
id = "classify"
title = "Classify the candidate"
needs = ["enforce-safety-exclusions"]
metadata = { "gc.run_target" = "{{operator_target}}", "gc.brief.path" = "{{brief_path}}", "gc.brief.root" = "{{artifact_root}}" }
description = """
Use `catch-no-brainer` and `no-brainer-brief-filter.md`.

Record exactly one classification:

- `no-brainer`
- `not-no-brainer`
- `needs-Taylor`

The classification must cite the gate evidence that permits or blocks shortcut
handling.
"""

[[steps]]
id = "guarded-execute"
title = "Guarded no-brainer execution"
needs = ["classify"]
condition = "{{mode}} == guarded-execute"
metadata = { "gc.run_target" = "{{operator_target}}", "gc.brief.path" = "{{brief_path}}", "gc.brief.root" = "{{artifact_root}}" }
description = """
Execute only if classification is `no-brainer`, all stop gates are clear, and
`{{artifact_root}}/ALLOW_NO_BRAINER_AUTO_EXECUTE` exists. Otherwise stop and
route the brief to Taylor.
"""

[steps.check]
max_attempts = 1

[steps.check.check]
mode = "exec"
path = "/Users/tdupuy/repos/gascity-packs/mathematics/assets/scripts/checks/brief-no-brainer-safety.sh"
timeout = "1m"

[[steps]]
id = "record-classification"
title = "Record no-brainer classification"
needs = ["classify", "guarded-execute"]
metadata = { "gc.run_target" = "{{operator_target}}", "gc.brief.path" = "{{brief_path}}", "gc.brief.root" = "{{artifact_root}}" }
description = """
Record the classification and any guarded execution result in the brief record.
If execution did not occur, leave the brief in the normal Taylor presentation
path.
"""
