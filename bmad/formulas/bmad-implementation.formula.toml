description = """
BMAD implementation of the public implement methodology contract.
"""
formula = "bmad-implementation"
version = 1
extends = ["implement"]
target_required = true
internal = true

[requires]
formula_compiler = ">=2.0.0"

[vars]
[vars.implementation_target]
description = "BMAD task implementation role."
default = "bmad.story-implementer"

[[steps]]
id = "drain-separate"
title = "Drain BMAD story development in separate sessions"
needs = ["prepare"]
condition = "{{drain_policy}} == separate"
metadata = { "gc.run_target" = "{{implementation_target}}" }
description_file = "../assets/workflows/bmad-implementation/drain-separate.md"

[steps.drain]
context = "separate"
formula = "bmad-story-development"
member_access = "exclusive"

[[steps]]
id = "drain-same-session"
title = "Drain BMAD story development in one shared session"
needs = ["prepare"]
condition = "{{drain_policy}} == same-session"
metadata = { "gc.run_target" = "{{implementation_target}}" }
description_file = "../assets/workflows/bmad-implementation/drain-same-session.md"

[steps.drain]
context = "shared"
formula = "bmad-story-development-item"
on_item_failure = "skip_remaining"
member_access = "exclusive"

[steps.drain.item]
single_lane = true
